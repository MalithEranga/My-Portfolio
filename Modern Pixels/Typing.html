<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pixels | Ultra-Premium Document Vault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ULTRA-PREMIUM MINIMALIST THEME --- */
        :root {
            --bg-base: #050505;
            --bg-surface: rgba(15, 15, 15, 0.6);
            --accent: #00ff66;
            --accent-glow: rgba(0, 255, 102, 0.3);
            --text-main: #ffffff;
            --text-dim: #888888;
            --border-glass: rgba(255, 255, 255, 0.05);
            --border-highlight: rgba(255, 255, 255, 0.1);
            
            --book-1: #0f172a; --book-2: #1e1b4b; --book-3: #064e3b; 
            --book-4: #450a0a; --book-5: #171717;
            
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Space Grotesk', sans-serif; background-color: var(--bg-base);
            color: var(--text-main); height: 100vh; overflow: hidden; display: flex;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 102, 0.05), transparent 40%);
            -webkit-user-select: none; user-select: none;
        }

        /* --- CINEMATIC GRAIN OVERLAY --- */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.04;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        @media print { body { display: none !important; } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-highlight); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .app-container { 
            display: flex; width: 100%; height: 100%; padding: 2vw; gap: 2vw; 
            z-index: 10; perspective: 2000px; 
        }

        /* --- STATIC 3D SIDEBAR --- */
        .sidebar-wrapper {
            width: 420px; perspective: 1000px; display: flex; flex-direction: column;
            transform-style: preserve-3d;
        }

        .sidebar {
            width: 100%; height: 100%; background: var(--bg-surface);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass); border-radius: 24px;
            padding: 40px 30px; display: flex; flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .nav-brand-box {
            font-family: 'Syncopate', sans-serif; font-size: 1.4rem; font-weight: 700;
            letter-spacing: 4px; margin-bottom: 25px; cursor: default;
            display: flex; flex-direction: column; gap: 5px; transform: translateZ(30px);
        }
        .nav-brand-box span.light { font-weight: 400; font-size: 0.8rem; color: var(--text-dim); letter-spacing: 6px;}
        .nav-brand-box span.accent { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

        /* --- LIVE SEARCH BAR --- */
        .search-container {
            margin-bottom: 30px; position: relative; transform: translateZ(20px);
        }
        .search-input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass);
            border-radius: 12px; padding: 15px 20px 15px 45px; color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); background: rgba(0,0,0,0.6); }
        .search-icon {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; fill: var(--text-dim); transition: 0.3s;
        }
        .search-input:focus + .search-icon { fill: var(--accent); }

        #menu-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding-right: 15px; transform: translateZ(10px); }

        .topic-group { margin-bottom: 40px; transition: opacity 0.3s; }

        .topic-title {
            font-family: 'Space Grotesk', sans-serif; font-size: 0.75rem; color: var(--text-dim);
            margin-bottom: 20px; letter-spacing: 4px; text-transform: uppercase; font-weight: 600;
            border-bottom: 1px solid var(--border-glass); padding-bottom: 10px;
        }

        /* --- ENHANCED 3D SHELF --- */
        .pdf-shelf { 
            list-style: none; display: flex; flex-wrap: wrap; align-items: flex-end; gap: 8px; 
            padding: 10px 5px; min-height: 180px; 
            border-bottom: 4px solid rgba(255,255,255,0.03); 
            position: relative;
        }
        .pdf-shelf::after {
            content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .book {
            width: 45px; height: 150px; border-radius: 3px 6px 6px 3px; 
            position: relative; display: flex; justify-content: center; align-items: center;
            transition: all 0.6s var(--ease-out-expo);
            box-shadow: inset 8px 0 15px -5px rgba(0,0,0,0.8), inset -1px 0 3px rgba(255,255,255,0.2), 10px 10px 20px rgba(0,0,0,0.6);
            border-left: 5px solid rgba(255,255,255,0.7); border-right: 1px solid #000;
            overflow: hidden; transform-origin: bottom left;
            transform: translateZ(0) rotateY(-15deg); cursor: pointer;
        }

        .book::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.15) 40%, transparent 60%);
            mix-blend-mode: overlay; pointer-events: none;
        }

        .book.hidden { display: none; }

        .book:nth-child(5n+1) { background-color: var(--book-1); } 
        .book:nth-child(5n+2) { background-color: var(--book-2); } 
        .book:nth-child(5n+3) { background-color: var(--book-3); } 
        .book:nth-child(5n+4) { background-color: var(--book-4); } 
        .book:nth-child(5n+5) { background-color: var(--book-5); } 

        /* Physics-based hover */
        .book:hover { 
            transform: translateY(-20px) translateZ(40px) rotateY(0deg) rotateX(5deg); 
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.5), -15px 25px 30px rgba(0,0,0,0.8); z-index: 10;
        }
        
        .book.active {
            transform: translateY(-30px) translateZ(60px) rotateY(0deg);
            box-shadow: 0 0 40px var(--accent-glow); border-left-color: var(--accent); z-index: 11;
        }

        .book-title {
            color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
            letter-spacing: 1px; white-space: nowrap; writing-mode: vertical-rl; 
            transform: rotate(180deg); max-height: 120px; overflow: hidden; text-overflow: ellipsis; 
            text-shadow: 1px 1px 5px rgba(0,0,0,0.9); pointer-events: none; opacity: 0.85;
            transition: opacity 0.3s;
        }
        .book:hover .book-title { opacity: 1; }

        /* --- GLASS VIEWER AREA --- */
        .content-area {
            flex: 1; background: var(--bg-surface); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass); border-radius: 24px; 
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .pdf-header {
            width: 100%; height: 70px; background: rgba(5, 5, 5, 0.6); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; position: absolute; top: 0; left: 0; z-index: 20;
            transform: translateY(-100%); transition: transform 0.6s var(--ease-out-expo);
        }
        .pdf-header.visible { transform: translateY(0); }

        .current-book-title {
            font-family: 'Space Grotesk', sans-serif; font-size: 1rem; color: #fff; font-weight: 500;
            display: flex; align-items: center; gap: 15px; letter-spacing: 1px;
        }
        .current-book-title::before {
            content: ''; display: block; width: 8px; height: 8px; background: var(--accent); 
            border-radius: 50%; box-shadow: 0 0 10px var(--accent);
        }

        .close-btn {
            background: transparent; border: 1px solid var(--border-glass); color: var(--text-dim); 
            width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-size: 1rem; transition: 0.4s var(--ease-out-expo); cursor: pointer;
        }
        .close-btn:hover { background: #fff; color: #000; transform: rotate(90deg); border-color: #fff; }

        /* ADVANCED LOADER */
        .loader-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; flex-direction: column; align-items: center; gap: 20px; z-index: 15;
        }
        .loader-bar {
            width: 150px; height: 2px; background: var(--border-glass); position: relative; overflow: hidden;
        }
        .loader-progress {
            position: absolute; top: 0; left: 0; height: 100%; width: 50%; background: var(--accent);
            box-shadow: 0 0 15px var(--accent); animation: loadingScan 1.5s ease-in-out infinite alternate;
        }
        .loader-text { font-family: 'Syncopate', sans-serif; font-size: 0.7rem; letter-spacing: 4px; color: var(--text-dim); animation: pulse 2s infinite; }

        .iframe-wrapper { width: 100%; height: 100%; padding-top: 70px; opacity: 0; transition: opacity 0.8s; display: none; position: relative; }
        .iframe-wrapper.loaded { opacity: 1; display: block; }
        
        /* --- PDF WATERMARK OVERLAY --- */
        .iframe-overlay { 
            position: absolute; top: 70px; left: 0; width: 100%; height: calc(100% - 70px); 
            z-index: 50; 
            pointer-events: none; /* VERY IMPORTANT: allows interacting with PDF beneath */
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .pdf-watermark {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 10vw; /* Scales with screen size */
            color: rgba(0, 0, 0, 0.15); /* Dark transparent color */
            transform: rotate(-35deg); 
            white-space: nowrap;
            letter-spacing: 15px;
            user-select: none;
            pointer-events: none;
        }

        iframe { width: 100%; height: 100%; border: none; background: #fff; }
        
        #placeholder-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: flex; flex-direction: column; align-items: center; gap: 30px;
            width: 100%; transition: opacity 0.4s;
        }
        .brand-watermark {
            font-family: 'Bebas Neue', sans-serif; font-size: 8rem; color: rgba(255,255,255,0.02);
            position: absolute; pointer-events: none; letter-spacing: 10px;
        }
        #placeholder-text { font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; color: var(--text-dim); letter-spacing: 5px; text-transform: uppercase; }

        @keyframes loadingScan { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- RESPONSIVE DESIGN FOR TABLETS & PHONES --- */
        @media (max-width: 1024px) {
            /* Keep it as a single scrolling page on mobile */
            body { overflow-y: auto; }
            .app-container { flex-direction: column; padding: 15px; height: auto; min-height: 100vh; }
            
            .sidebar-wrapper { width: 100%; perspective: none; }
            .sidebar { transform: none !important; border-radius: 20px;}
            
            /* Content area remains in normal flow, below the sidebar */
            .content-area { 
                height: 65vh; /* Gives good height for reading on mobile */
                min-height: 450px; 
                border-radius: 20px; 
                margin-top: 10px;
                display: flex; 
            }
            .pdf-watermark { font-size: 15vw; }
        }

        @media (max-width: 480px) {
            /* Make Books and Bookshelf smaller for mobile phones */
            .book { width: 32px; height: 105px; border-radius: 2px 4px 4px 2px; }
            .book-title { font-size: 1.05rem; max-height: 80px; }
            
            .pdf-shelf { min-height: 120px; padding: 5px; gap: 4px; border-bottom-width: 3px; }
            .pdf-shelf::after { bottom: -3px; height: 3px; }
            
            .nav-brand-box { font-size: 1.2rem; margin-bottom: 20px; }
            .search-container { margin-bottom: 20px; }
            .search-input { padding: 12px 15px 12px 40px; font-size: 0.85rem; }
            
            /* Adjust Watermark for very small screens */
            .pdf-watermark { font-size: 18vw; letter-spacing: 8px; }
            
            /* Adjust header close button for mobile */
            .pdf-header { padding: 0 15px; height: 60px; }
            .iframe-wrapper { padding-top: 60px; }
            .iframe-overlay { top: 60px; height: calc(100% - 60px); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="noise-overlay"></div>

    <div class="app-container">
        <!-- STATIC SIDEBAR -->
        <div class="sidebar-wrapper">
            <aside class="sidebar" id="sidebar">
                <div class="nav-brand-box">
                    <span class="light">WORKSPACE</span>
                    MODERN <span class="accent">VAULT</span>
                </div>
                
                <!-- LIVE SEARCH -->
                <div class="search-container">
                    <input type="text" class="search-input" id="search-input" placeholder="Search documents..." autocomplete="off">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </div>

                <div id="menu-container"></div>
            </aside>
        </div>

        <!-- DOCUMENT VIEWER -->
        <main class="content-area" id="viewer-section">
            <span class="brand-watermark">MODERN PIXELS</span>
            
            <div class="loader-container" id="viewer-loader">
                <div class="loader-bar"><div class="loader-progress"></div></div>
                <div class="loader-text">INITIALIZING DOCUMENT</div>
            </div>

            <div class="pdf-header" id="pdf-header">
                <div class="current-book-title" id="header-title-text">Document Name</div>
                <button class="close-btn" id="close-btn" title="Close Document">✕</button>
            </div>

            <div class="iframe-wrapper" id="iframe-wrapper">
                <!-- PDF WATERMARK OVERLAY -->
                <div class="iframe-overlay">
                    <div class="pdf-watermark">MODERN PIXELS</div>
                </div>
                <iframe id="pdf-viewer" src="" title="PDF Viewer"></iframe>
            </div>

            <div id="placeholder-container">
                <div id="placeholder-text">SYSTEM STANDBY <br><br> Select a document to initialize viewer</div>
            </div>
        </main>
    </div>

    <script>
        // --- SECURITY ---
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || 
               (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.key === 'p') || (e.ctrlKey && e.key === 'c')) { 
                e.preventDefault(); 
            }
        });

        // --- DATA ---
        const pdfCollection = [
            {
                topic: "Tutes", folderName: "Tutes",
                items: [
                    { name: "T1", fileName: "T1.pdf" },
                    { name: "T2", fileName: "T2.pdf" },
                    { name: "T3", fileName: "T3.pdf" },
                    { name: "T4", fileName: "T4.pdf" }
                ]
            }
        ];

        // --- RENDER UI ---
        const menuContainer = document.getElementById('menu-container');
        const pdfViewer = document.getElementById('pdf-viewer');
        const placeholderContainer = document.getElementById('placeholder-container');
        const iframeWrapper = document.getElementById('iframe-wrapper');
        const pdfHeader = document.getElementById('pdf-header');
        const headerTitleText = document.getElementById('header-title-text');
        const loader = document.getElementById('viewer-loader');
        const searchInput = document.getElementById('search-input');
        const viewerSection = document.getElementById('viewer-section'); 

        // !!! IMPORTANT FOR MOBILE EMBEDDING !!!
        // To force Mobile Browsers to render the PDF inline (not download it/open in new tab),
        // we use Google's free Docs viewer service for the iframe src if it's a mobile device.
        
        // This requires your website to be live on the internet (not localhost), 
        // replace this with your actual website domain where the PDFs are hosted.
        const YOUR_WEBSITE_URL = window.location.origin; // e.g. "https://modernpixels.com"

        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        function renderBooks() {
            pdfCollection.forEach((group, groupIndex) => {
                const topicDiv = document.createElement('div');
                topicDiv.className = 'topic-group';
                topicDiv.id = `group-${groupIndex}`;

                const topicTitle = document.createElement('div');
                topicTitle.className = 'topic-title';
                topicTitle.innerText = group.topic;
                topicDiv.appendChild(topicTitle);

                const shelf = document.createElement('ul');
                shelf.className = 'pdf-shelf';

                group.items.forEach((pdf, pdfIndex) => {
                    const book = document.createElement('li');
                    book.className = 'book';
                    book.setAttribute('data-name', pdf.name.toLowerCase()); // For search
                    
                    const bookTitle = document.createElement('span');
                    bookTitle.className = 'book-title';
                    bookTitle.innerText = pdf.name;
                    book.appendChild(bookTitle);
                    
                    // CLICK EVENT
                    book.addEventListener('click', function() {
                        document.querySelectorAll('.book').forEach(item => item.classList.remove('active'));
                        this.classList.add('active');
                        headerTitleText.innerText = pdf.name.toUpperCase();
                        
                        placeholderContainer.style.opacity = '0';
                        setTimeout(()=> placeholderContainer.style.display = 'none', 400);
                        
                        iframeWrapper.classList.remove('loaded'); 
                        loader.style.display = 'flex'; 

                        // Determine the file path
                        let relativePdfPath = `pdfs/${group.folderName}/${pdf.fileName}`;
                        
                        // If on Mobile, use Google Docs Viewer to force inline preview
                        if (isMobile() && YOUR_WEBSITE_URL !== "null" && YOUR_WEBSITE_URL !== "file://") {
                            // Needs absolute URL for Google Docs Viewer
                            let absolutePdfUrl = encodeURIComponent(`${YOUR_WEBSITE_URL}/${relativePdfPath}`);
                            pdfViewer.src = `https://docs.google.com/viewer?url=${absolutePdfUrl}&embedded=true`;
                        } else {
                            // Desktop behavior (adds security params)
                            pdfViewer.src = `${relativePdfPath}#toolbar=0&navpanes=0&scrollbar=0`;
                        }
                        
                        setTimeout(() => pdfHeader.classList.add('visible'), 200);

                        // Mobile View: Scroll down nicely to the viewer when a book is clicked
                        if(window.innerWidth <= 1024) {
                            setTimeout(() => {
                                viewerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }, 100);
                        }
                    });
                    
                    shelf.appendChild(book);
                });

                topicDiv.appendChild(shelf);
                menuContainer.appendChild(topicDiv);
            });
        }

        renderBooks();

        // --- LIVE SEARCH FUNCTIONALITY ---
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const groups = document.querySelectorAll('.topic-group');
            
            groups.forEach(group => {
                const books = group.querySelectorAll('.book');
                let hasVisibleBooks = false;
                
                books.forEach(book => {
                    const title = book.getAttribute('data-name');
                    if(title.includes(searchTerm)) {
                        book.classList.remove('hidden');
                        hasVisibleBooks = true;
                    } else {
                        book.classList.add('hidden');
                    }
                });
                
                // Hide entire group if no books match
                group.style.display = hasVisibleBooks ? 'block' : 'none';
            });
        });

        // --- IFRAME LOAD HANDLING ---
        pdfViewer.addEventListener('load', function() {
            if (pdfViewer.src !== "" && pdfViewer.src !== window.location.href) {
                loader.style.display = 'none';
                iframeWrapper.classList.add('loaded');
            }
        });

        // --- CLOSE BUTTON ---
        document.getElementById('close-btn').addEventListener('click', function() {
            document.querySelectorAll('.book').forEach(item => item.classList.remove('active'));
            pdfHeader.classList.remove('visible');
            iframeWrapper.classList.remove('loaded');
            
            setTimeout(() => {
                pdfViewer.src = "";
                loader.style.display = 'none';
                placeholderContainer.style.display = 'flex';
                
                setTimeout(()=> placeholderContainer.style.opacity = '1', 50);
            }, 500); 
        });
    </script>
</body>
</html>
