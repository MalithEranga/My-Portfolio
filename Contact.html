<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Modern Pixels</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syncopate:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f3ff; 
            --secondary: #8b5cf6; 
            --bg-dark: #03050a; 
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(0, 243, 255, 0.15);
            --glow-cyan: rgba(0, 243, 255, 0.15);
            --glow-purple: rgba(139, 92, 246, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg-dark); color: #fff; overflow-x: hidden; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #03050a; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .wrapper { position: relative; padding: 80px 5% 60px 5%; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }

        /* Binary Canvas Background */
        #binaryCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8; }

        .bg-grid { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 40px 40px; z-index: 1; top: 0; left: 0;}
        .bg-grid::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 100%); }
        
        .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6; z-index: 0; animation: pulse 8s infinite alternate;}
        .blob-1 { width: 450px; height: 450px; background: var(--glow-cyan); top: 5%; left: 10%; }
        .blob-2 { width: 400px; height: 400px; background: var(--glow-purple); bottom: 5%; right: 10%; }

        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }

        /* Container width increased */
        .content-container { position: relative; z-index: 2; width: 100%; max-width: 1000px; }

        .section-header { margin-bottom: 50px; text-align: center; }
        .section-title { font-family: 'Syncopate', sans-serif; font-size: clamp(1.8rem, 3vw, 2.5rem); text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 20px var(--glow-cyan);}
        .section-title span { color: var(--primary); }
        .subtitle { font-size: 0.9rem; color: var(--secondary); letter-spacing: 4px; font-weight: 500; margin-top: 15px; text-transform: uppercase;}

        .glass-panel { padding: 45px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0, 243, 255, 0.05); position: relative; overflow: hidden; display: flex; flex-direction: column;}
        .glass-panel::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(0, 243, 255, 0.03), transparent); transform: rotate(45deg); pointer-events: none;}

        /* Social Icons */
        .social-container { width: 100%; }
        .social-container h3 { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; margin-bottom: 30px; color: #fff; letter-spacing: 1px; text-align: center;}
        
        /* Forces 7 items into a single row on desktop */
        .social-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 20px; }
        
        .social-card { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); padding: 25px 10px; border-radius: 14px; text-decoration: none; color: var(--text-muted); transition: all 0.4s ease; cursor: pointer;}
        .social-card i { font-size: 2.2rem; margin-bottom: 15px; transition: 0.3s; }
        .social-card span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}
        .social-card:hover { border-color: var(--primary); background: rgba(0, 243, 255, 0.05); transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5); color: #fff;}
        .social-card:hover i { color: var(--primary); text-shadow: 0 0 15px var(--primary);}

        /* Direct Contacts */
        .direct-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .direct-card { border-color: var(--secondary) !important; flex-direction: row; gap: 15px; padding: 20px; }
        .direct-card i { margin-bottom: 0; font-size: 1.5rem;}
        .direct-card:hover { border-color: var(--secondary) !important; background: rgba(139, 92, 246, 0.05) !important; }
        .direct-card:hover i { color: var(--secondary) !important; text-shadow: 0 0 15px var(--secondary) !important; }

        /* Toast Notification for Email Copy */
        .toast { position: fixed; top: 30px; right: 30px; background: rgba(0, 243, 255, 0.1); border: 1px solid var(--primary); color: #fff; padding: 15px 25px; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); transform: translateX(150%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000; backdrop-filter: blur(10px);}
        .toast.show { transform: translateX(0); }
        .toast i { color: var(--primary); font-size: 1.2rem; }

        /* Responsive Fix for Mobile */
        @media screen and (max-width: 900px) {
            .social-grid { grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); }
        }
        @media screen and (max-width: 600px) {
            .direct-grid { grid-template-columns: 1fr; }
            .glass-panel { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="toast" id="copy-toast">
        <i class="fas fa-check-circle"></i> <span>Email Copied to Clipboard!</span>
    </div>

    <div class="wrapper">
        <canvas id="binaryCanvas"></canvas>
        
        <div class="bg-grid"></div>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <div class="content-container">
            
            <div class="section-header">
                <h2 class="section-title">Contact <span>Malith Eranga</span></h2>
               
            </div>

            <div class="social-container">
                <div class="glass-panel">
                    
                    
                    <div class="social-grid">
                        <a href="https://www.linkedin.com/in/malitheranga" target="_blank" class="social-card">
                            <i class="fab fa-linkedin-in"></i><span>LinkedIn</span>
                        </a>
                        <a href="https://github.com/malitheranga" target="_blank" class="social-card">
                            <i class="fab fa-github"></i><span>GitHub</span>
                        </a>
                        <a href="https://www.facebook.com/share/qeesxzKKnckcyghV/?mibextid=qi2Omg" target="_blank" class="social-card">
                            <i class="fab fa-facebook-f"></i><span>Facebook</span>
                        </a>
                        <a href="https://www.youtube.com/channel/UCV5gI6ueRV103C2-9dEWr1Q" target="_blank" class="social-card">
                            <i class="fab fa-youtube"></i><span>YouTube</span>
                        </a>
                        <a href="https://www.tiktok.com/@modern_pixels?_r=1&_t=ZS-95Z6NnOftt2" target="_blank" class="social-card">
                            <i class="fab fa-tiktok"></i><span>TikTok</span>
                        </a>
                        <a href="https://wa.me/94786026856" target="_blank" class="social-card">
                            <i class="fab fa-whatsapp"></i><span>WhatsApp</span>
                        </a>
                        <a href="https://t.me/ModernPixels" target="_blank" class="social-card">
                            <i class="fab fa-telegram-plane"></i><span>Telegram</span>
                        </a>
                    </div>

                    <div class="direct-grid">
                        <div class="social-card direct-card" id="email-btn" title="Click to copy email">
                            <i class="fas fa-envelope"></i><span>Copy Email</span>
                        </div>
                        <a href="tel:+94786026856" class="social-card direct-card" title="Call Now">
                            <i class="fas fa-phone-alt"></i><span>Voice Call</span>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Binary Rain Effect
        const canvas = document.getElementById('binaryCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const characters = '01';
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            // Background color with opacity to create trail effect
            ctx.fillStyle = 'rgba(3, 5, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Text color (Cyan with low opacity for 'lawata' look)
            ctx.fillStyle = 'rgba(0, 243, 255, 0.25)'; 
            ctx.font = fontSize + 'px monospace';
            
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                // Reset drop to top randomly
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        // Speed of the rain
        setInterval(drawMatrix, 50);

        // Email Copy Functionality
        const emailBtn = document.getElementById('email-btn');
        const toast = document.getElementById('copy-toast');
        const myEmail = "erangamalith2002@gmail.com";

        emailBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(myEmail).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }).catch(err => console.error('Failed to copy: ', err));
        });

        // තමන්ගේ height එක මැනලා main page එකට යවනවා
        function sendHeightToParent() {
            const bodyHeight = document.documentElement.scrollHeight;
            window.parent.postMessage({
                type: 'resize',
                height: bodyHeight,
                url: window.location.href
            }, '*');
        }

        // Page එක load වෙද්දි සහ ඇතුලේ මොනවා හරි වෙනස් වෙද්දි height එක update කරනවා
        window.addEventListener('load', sendHeightToParent);
        new ResizeObserver(sendHeightToParent).observe(document.body);
    </script>
</body>
</html>
