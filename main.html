<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Malith Eranga</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syncopate:wght@600&display=swap" rel="stylesheet">
<style>
:root {
--primary: #3b82f6;
--secondary: #00ffcc; 
--bg-overlay: rgba(4, 8, 18, 0);
--text-main: #f8fafc;
--text-muted: #cbd5e1;
--bot-main: #1e293b;
--bot-light: #334155;
--bot-glow: #00ffcccc;
}

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeInPage {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    @keyframes navSlideDown {
        0% { opacity: 0; transform: translate(-50%, -30px); }
        100% { opacity: 1; transform: translate(-50%, 0); }
    }

    html {
        background-color: #030712; 
        width: 100%; height: 100%;
        scroll-behavior: smooth;
    }

    body {
        width: 100%; height: 100%;
        background-color: #030712; 
        font-family: 'Space Grotesk', sans-serif;
        color: var(--text-main);
        overflow-x: hidden;
        opacity: 0;
        animation: fadeInPage 2s ease-in-out forwards;
    }

    /* --- Hero Section --- */
    .hero-section {
        position: relative;
        width: 100%;
        min-height: 800px; 
        background: url('Backgrounds/background1.png');
        background-size: cover;
        background-position: center; 
        background-repeat: no-repeat;
        overflow: hidden;
    }

    /* --- High-End Centered Navigation --- */
    .top-nav {
        position: fixed;
        top: 30px;
        left: 50%; 
        z-index: 100;
        background: rgba(15, 23, 42, 0.3);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: 2px solid var(--secondary); 
        border-radius: 30px; 
        padding: 10px 30px; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        opacity: 0;
        animation: navSlideDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; 
    }

    .top-nav ul { list-style: none; display: flex; gap: 25px; align-items: center; }
    .top-nav li a {
        text-decoration: none; color: var(--text-muted); font-size: 0.75rem; 
        font-weight: 600; text-transform: uppercase; letter-spacing: 2px; 
        transition: all 0.4s ease; position: relative; padding: 5px 0;
    }
    .top-nav li a:hover, .top-nav li a.active { color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
    .top-nav li a::after {
        content: ''; position: absolute; width: 4px; height: 4px; bottom: -2px; left: 50%;
        transform: translateX(-50%) scale(0); background-color: var(--secondary); 
        border-radius: 50%; transition: transform 0.3s ease; box-shadow: 0 0 8px var(--secondary);
    }
    .top-nav li a:hover::after, .top-nav li a.active::after { transform: translateX(-50%) scale(1); }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #030712; }
    ::-webkit-scrollbar-thumb {
        background-color: rgba(30, 41, 59, 0.8); border-radius: 10px; transition: all 0.4s ease;
    }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--secondary); }

    /* --- Stars Canvas --- */
    #starsCanvas {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1; pointer-events: none; mix-blend-mode: screen;
    }

    .Projects-iframe {
        width: 100%; border: none; position: relative; z-index: 20; 
        display: block; overflow: hidden;
    }

    /* =========================================
       CUTE CHUTI CYBER-PET "TORA"
       ========================================= */
    #chuti-bot {
        position: fixed;
        bottom: 30px;
        right: 40px;
        width: 70px;
        height: 90px;
        z-index: 1000;
        pointer-events: auto; 
        cursor: pointer;      
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
    }

    /* TORA Holographic Name Tag */
    .chuti-name {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Syncopate', sans-serif;
        font-size: 9px;
        font-weight: 700;
        color: var(--secondary);
        letter-spacing: 2px;
        text-shadow: 0 0 5px var(--secondary);
        opacity: 0.9;
        z-index: 20;
        transition: color 0.4s ease, text-shadow 0.4s ease;
    }

    .chuti-shadow {
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 8px;
        background: rgba(0, 255, 204, 0.2);
        border-radius: 50%;
        filter: blur(4px);
        animation: chutiShadowPulse 3s ease-in-out infinite;
        transition: background 0.4s ease;
    }

    .chuti-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        animation: chutiFloat 3s ease-in-out infinite;
    }

    /* Base Transitions */
    .chuti-body, .chuti-head, .chuti-arm, .chuti-leg, .chuti-ear, .chuti-core, .chuti-eye {
        transition: background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    }

    /* --- Body --- */
    .chuti-body {
        position: absolute;
        top: 45px;
        left: 50%;
        margin-left: -18px;
        width: 36px;
        height: 32px;
        background: linear-gradient(135deg, var(--bot-light), var(--bot-main));
        border-radius: 15px 15px 10px 10px;
        border: 2px solid #475569;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
    }

    .chuti-core {
        width: 10px;
        height: 10px;
        background: var(--primary);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--primary), inset 0 0 4px #fff;
        animation: heartBeat 1.5s infinite;
    }

    /* --- Head --- */
    .chuti-head {
        position: absolute;
        top: 5px;
        left: 50%;
        margin-left: -28px;
        width: 56px;
        height: 42px;
        background: linear-gradient(145deg, #cbd5e1, #94a3b8);
        border-radius: 25px 25px 18px 18px;
        border: 2px solid #64748b;
        box-shadow: 0 5px 10px rgba(0,0,0,0.4), inset 0 2px 5px #fff;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        will-change: transform;
        transform-origin: center bottom;
    }

    .chuti-visor {
        width: 80%;
        height: 22px;
        background: #020617;
        border-radius: 10px;
        border: 2px solid #1e293b;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }

    .chuti-eyes-container {
        display: flex;
        gap: 12px;
        will-change: transform;
    }

    .chuti-eye {
        width: 8px;
        height: 12px;
        background: var(--secondary);
        border-radius: 10px;
        box-shadow: 0 0 8px var(--secondary), 0 0 15px #fff;
        animation: cuteBlink 4s infinite;
    }

    .chuti-cheek {
        position: absolute;
        bottom: 2px;
        width: 6px;
        height: 3px;
        background: rgba(255, 51, 102, 0.6);
        border-radius: 5px;
        filter: blur(1px);
    }
    .chuti-cheek.left { left: 4px; }
    .chuti-cheek.right { right: 4px; }

    .chuti-ear {
        position: absolute;
        top: 15px;
        width: 6px;
        height: 12px;
        background: var(--bot-main);
        border-radius: 3px;
        border: 1px solid #475569;
    }
    .chuti-ear.left { left: -6px; border-radius: 5px 0 0 5px; border-right: none; }
    .chuti-ear.right { right: -6px; border-radius: 0 5px 5px 0; border-left: none; }

    /* --- Limbs --- */
    .chuti-arm {
        position: absolute;
        top: 50px;
        width: 10px;
        height: 22px;
        background: linear-gradient(to bottom, var(--bot-light), var(--bot-main));
        border-radius: 5px;
        border: 1px solid #475569;
        z-index: 6;
        animation: armSwing 3s ease-in-out infinite;
    }
    .chuti-arm.left { left: 8px; transform-origin: top center; }
    .chuti-arm.right { right: 8px; transform-origin: top center; animation-delay: 1.5s; }

    .chuti-leg {
        position: absolute;
        bottom: 0px;
        width: 12px;
        height: 18px;
        background: var(--bot-main);
        border-radius: 4px 4px 8px 8px;
        border: 1px solid #475569;
        z-index: 4;
        animation: legDangle 3s ease-in-out infinite;
    }
    .chuti-leg.left { left: 20px; transform-origin: top center; }
    .chuti-leg.right { right: 20px; transform-origin: top center; animation-delay: 1.5s; }

    /* =========================================
       TORA ACTIVE STATE (GREEN ON HOVER/PROXIMITY)
       ========================================= */
    #chuti-bot.tora-active .chuti-name { color: #00ffcccc; text-shadow: 0 0 10px #22c55e; opacity: 0; } 
    #chuti-bot.tora-active .chuti-head { background: linear-gradient(145deg, #bbf7d0, #4ade80); border-color: #16a34a; }
    #chuti-bot.tora-active .chuti-body { background: linear-gradient(135deg, #15803d, #14532d); border-color: #22c55e; }
    #chuti-bot.tora-active .chuti-arm, 
    #chuti-bot.tora-active .chuti-leg, 
    #chuti-bot.tora-active .chuti-ear { background: #14532d; border-color: #22c55e; }
    #chuti-bot.tora-active .chuti-eye { background: #22c55e; box-shadow: 0 0 10px #22c55e, 0 0 20px #fff; }
    #chuti-bot.tora-active .chuti-core { background: #22c55e; box-shadow: 0 0 15px #22c55e, inset 0 0 5px #fff; }
    #chuti-bot.tora-active .chuti-shadow { background: rgba(34, 197, 94, 0.3); }

    /* --- Animations --- */
    @keyframes chutiFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes chutiShadowPulse { 0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; } 50% { transform: translateX(-50%) scale(0.7); opacity: 0.3; } }
    @keyframes cuteBlink { 0%, 90%, 94%, 100% { transform: scaleY(1); } 92%, 96% { transform: scaleY(0.1); } }
    @keyframes heartBeat { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px var(--primary); } }
    @keyframes armSwing { 0%, 100% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } }
    @keyframes legDangle { 0%, 100% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } }

    /* =========================================
       TORA AI CHAT PANEL CSS (UPDATED)
       ========================================= */
    .tora-chat-panel {
        position: absolute;
        bottom: 110px; 
        right: 0;
        width: 320px;
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid #22c55e;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.7), 0 0 15px rgba(34, 197, 94, 0.3);
        color: #fff;
        font-family: 'Space Grotesk', sans-serif;
        opacity: 0;
        pointer-events: none;
        transform: translateY(20px) scale(0.9);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .tora-chat-panel.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scale(1);
    }

    #tora-chat-header {
        font-weight: bold;
        font-size: 14px;
        border-bottom: 1px solid rgba(34, 197, 94, 0.3);
        padding-bottom: 8px;
        color: #22c55e;
        display: flex;
        align-items: center;
    }

    .tora-messages-container {
        flex-grow: 1;
        max-height: 250px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-right: 5px;
    }

    /* Custom scrollbar for chat messages */
    .tora-messages-container::-webkit-scrollbar { width: 4px; }
    .tora-messages-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    .tora-messages-container::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 4px; }

    .message {
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.4;
        max-width: 85%;
        word-wrap: break-word;
    }

    .message.bot {
        background: rgba(3, 7, 18, 0.6);
        border-left: 3px solid #22c55e;
        align-self: flex-start;
        border-bottom-left-radius: 0;
    }

    .message.user {
        background: rgba(34, 197, 94, 0.15);
        border-right: 3px solid #22c55e;
        align-self: flex-end;
        border-bottom-right-radius: 0;
        color: #bbf7d0;
        text-align: right;
    }

    .tora-input-container {
        display: flex;
        gap: 8px;
        margin-top: 5px;
    }

    #chatbot-input {
        flex-grow: 1;
        background: rgba(3, 7, 18, 0.8);
        border: 1px solid #64748b;
        color: #fff;
        padding: 10px;
        border-radius: 6px;
        outline: none;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 12px;
        transition: border-color 0.3s;
    }

    #chatbot-input:focus {
        border-color: #22c55e;
    }

    #send-btn {
        background: #22c55e;
        color: #020617;
        border: none;
        padding: 0 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-family: 'Space Grotesk', sans-serif;
        transition: all 0.3s ease;
    }

    #send-btn:hover {
        background: #16a34a;
        transform: scale(1.05);
    }

    .close-chat {
        position: absolute;
        top: 15px;
        right: 15px;
        background: none;
        border: none;
        color: #ef4444;
        cursor: pointer;
        font-size: 14px;
        transition: transform 0.3s ease;
    }
    
    .close-chat:hover {
        transform: scale(1.2);
    }

    /* =========================================
       MY RESUME BUTTON
       ========================================= */
    .resume-btn {
        position: fixed; 
        top: 30px;      
        right: 40px;    
        z-index: 1000;
        padding: 12px 24px;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 204, 0.5);
        border-radius: 10px; 
        color: var(--text-main);
        font-family: 'Space Grotesk', sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), 0 0 10px rgba(0, 255, 204, 0.2);
    }

    .resume-btn:hover {
        background: rgba(0, 255, 204, 0.15);
        border-color: var(--secondary);
        box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
        transform: translateY(-3px) scale(1.05);
        color: #fff;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .resume-btn::after {
        content: '';
        position: absolute;
        top: 0; 
        left: -100%;
        width: 50%; 
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.4), transparent);
        transition: all 0.5s ease;
    }

    .resume-btn:hover::after {
        left: 150%;
        transition: all 0.7s ease;
    }

</style>
</head>

<script>
    // --- Background Stars Logic ---
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    const heroSection = document.querySelector('.hero-section');
    let stars = [];

    function resize() {
        canvas.width = heroSection.offsetWidth;
        canvas.height = heroSection.offsetHeight;
    }

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.2; 
            this.baseAlpha = Math.random() * 0.5 + 0.1;
            this.pulseSpeed = Math.random() * 0.02 + 0.005;
            this.angle = Math.random() * Math.PI * 2; 
        }
        update() {
            this.angle += this.pulseSpeed;
            this.alpha = this.baseAlpha + Math.sin(this.angle) * 0.5;
            if (this.alpha < 0) this.alpha = 0; if (this.alpha > 1) this.alpha = 1;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            if (this.alpha > 0.6) { ctx.shadowBlur = 6; ctx.shadowColor = "rgba(255, 255, 255, 0.8)"; } 
            else { ctx.shadowBlur = 0; }
            ctx.fill();
        }
    }

    function initStars() { stars = []; for (let i = 0; i < 200; i++) stars.push(new Star()); }
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => { star.update(); star.draw(); });
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', resize); resize(); initStars(); animateStars();

    // --- Navigation Scroll Logic ---
    const navLinks = document.querySelectorAll('.top-nav ul li a');
    window.addEventListener('scroll', () => {
        let current = '';
        const sections = document.querySelectorAll('#aboutme, #Projects, #education, #more, #contact');
        sections.forEach(section => {
            const sectionTop = section.offsetTop;
            if (pageYOffset >= sectionTop - 250) { current = section.getAttribute('id'); }
        });
        navLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href').includes(current) && current !== '') { link.classList.add('active'); }
        });
    });

    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'resize') {
            const iframes = document.querySelectorAll('.Projects-iframe');
            iframes.forEach(iframe => {
                if (event.data.url.includes(iframe.getAttribute('src'))) {
                    iframe.style.height = event.data.height + 'px'; 
                }
            });
        }
    });

    function slowScrollTo(elementId, duration) {
        const target = document.getElementById(elementId);
        if (!target) return;

        document.documentElement.style.scrollBehavior = 'auto';

        const targetPosition = target.getBoundingClientRect().top + window.pageYOffset;
        const startPosition = window.pageYOffset;
        const distance = targetPosition - startPosition;
        let startTime = null;

        function animation(currentTime) {
            if (startTime === null) startTime = currentTime;
            const timeElapsed = currentTime - startTime;
            const run = easeInOutQuad(timeElapsed, startPosition, distance, duration);
            
            window.scrollTo(0, run);
            
            if (timeElapsed < duration) {
                requestAnimationFrame(animation);
            } else {
                document.documentElement.style.scrollBehavior = 'smooth';
            }
        }

        function easeInOutQuad(t, b, c, d) {
            t /= d / 2;
            if (t < 1) return c / 2 * t * t + b;
            t--;
            return -c / 2 * (t * (t - 2) - 1) + b;
        }

        requestAnimationFrame(animation);
    }

    // =========================================
    // OPENAI CHATBOT LOGIC
    // =========================================
    const chutiBot = document.getElementById('chuti-bot');
    const chatPanel = document.getElementById('tora-chat-panel');
    const chatbotInput = document.getElementById("chatbot-input");
    const sendBtn = document.getElementById("send-btn");
    const chatbotMessages = document.getElementById("chatbot-messages");

    chutiBot.addEventListener('click', (e) => {
        if(e.target.closest('.tora-chat-panel')) return; 
        chatPanel.classList.add('show');
    });

    function closeChat(e) {
        e.stopPropagation(); 
        chatPanel.classList.remove('show');
    }

    sendBtn.addEventListener("click", sendMessage);

    chatbotInput.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    function sendMessage() {
        const userMessage = chatbotInput.value.trim();
        if (userMessage) {
            appendMessage("user", userMessage);
            chatbotInput.value = ""; 
            getBotResponse(userMessage);
        }
    }

    function appendMessage(sender, message) {
        const messageElement = document.createElement("div");
        messageElement.classList.add("message", sender);
        messageElement.textContent = message;
        
        chatbotMessages.appendChild(messageElement);
        chatbotMessages.scrollTop = chatbotMessages.scrollHeight; 
    }

    async function getBotResponse(userMessage) {
        // මෙතනට ඔයාගේ OpenAI API key එක දාන්න!
        const apiKey = "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"; 
        const apiUrl = "https://api.openai.com/v1/chat/completions";

        try {
            const response = await fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [
                        { role: "system", content: "You are TORA, a friendly AI assistant built into Malith Eranga's portfolio website. You answer questions briefly and professionally about Malith, who is an undergraduate at SUSL, a web/graphic designer, and founder of Modern Pixels." },
                        { role: "user", content: userMessage }
                    ],
                    max_tokens: 150
                })
            });

            const data = await response.json();
            const botMessage = data.choices[0].message.content;
            appendMessage("bot", botMessage);
            
        } catch (error) {
            console.error("Error connecting to AI:", error);
            appendMessage("bot", "Sorry! I am having trouble connecting to my brain right now. ⚠️");
        }
    }

    // =========================================
    // CUTE MOUSE TRACKING & PROXIMITY LOGIC
    // =========================================
    const chutiHead = document.getElementById('chuti-head');
    const chutiEyes = document.getElementById('chuti-eyes');

    let currentX = 0, currentY = 0;
    let targetX = 0, targetY = 0;
    
    let rawMouseX = window.innerWidth / 2;
    let rawMouseY = window.innerHeight / 2;

    function updateTargetPosition(clientX, clientY) {
        rawMouseX = clientX;
        rawMouseY = clientY;
        targetX = ((clientX / window.innerWidth) - 0.5) * 2;
        targetY = ((clientY / window.innerHeight) - 0.5) * 2;
    }

    document.addEventListener('mousemove', (e) => {
        updateTargetPosition(e.clientX, e.clientY);
    });

    const allIframes = document.querySelectorAll('.Projects-iframe');
    allIframes.forEach(iframe => {
        iframe.addEventListener('load', () => {
            try {
                const iframeDoc = iframe.contentWindow.document;
                iframeDoc.addEventListener('mousemove', (e) => {
                    const rect = iframe.getBoundingClientRect();
                    const adjustedX = e.clientX + rect.left;
                    const adjustedY = e.clientY + rect.top;
                    updateTargetPosition(adjustedX, adjustedY);
                });
            } catch (err) {
                console.warn("Iframe tracking active.");
            }
        });
    });

    function animateChuti() {
        if (chutiHead && chutiEyes && chutiBot) {
            const rect = chutiBot.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dist = Math.hypot(rawMouseX - centerX, rawMouseY - centerY);
            
            if (dist < 150) {
                chutiBot.classList.add('tora-active');
            } else {
                chutiBot.classList.remove('tora-active');
            }

            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;
            
            const headTilt = currentX * 15; 
            const headShiftX = currentX * 8; 
            const headShiftY = currentY * 5; 
            chutiHead.style.transform = `translate(${headShiftX}px, ${headShiftY}px) rotate(${headTilt}deg)`;

            const eyeShiftX = currentX * 10;
            const eyeShiftY = currentY * 4;
            chutiEyes.style.transform = `translate(${eyeShiftX}px, ${eyeShiftY}px)`;
        }
        requestAnimationFrame(animateChuti);
    }
    
    animateChuti();
</script>
