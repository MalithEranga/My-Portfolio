<style>
:root {
--primary: #3b82f6;
--secondary: #00ffcc; 
--bg-overlay: rgba(4, 8, 18, 0);
--text-main: #f8fafc;
--text-muted: #cbd5e1;
--bot-main: #1e293b;
--bot-light: #334155;
--bot-glow: #00ffcccc;
}

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeInPage { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes navSlideDown { 0% { opacity: 0; transform: translate(-50%, -30px); } 100% { opacity: 1; transform: translate(-50%, 0); } }

    html { background-color: #030712; width: 100%; height: 100%; scroll-behavior: smooth; }

    body {
        width: 100%; height: 100%;
        background-color: #030712; 
        font-family: 'Space Grotesk', sans-serif;
        color: var(--text-main);
        overflow-x: hidden;
        opacity: 0;
        animation: fadeInPage 2s ease-in-out forwards;
    }

    .hero-section {
        position: relative; width: 100%; min-height: 800px; 
        background: url('Backgrounds/background1.png');
        background-size: cover; background-position: center; background-repeat: no-repeat;
        overflow: hidden;
    }

    .top-nav {
        position: fixed; top: 30px; left: 50%; z-index: 100;
        background: rgba(15, 23, 42, 0.3);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: 2px solid var(--secondary); 
        border-radius: 30px; padding: 10px 30px; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        opacity: 0;
        animation: navSlideDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; 
    }

    .top-nav ul { list-style: none; display: flex; gap: 25px; align-items: center; }
    .top-nav li a {
        text-decoration: none; color: var(--text-muted); font-size: 0.75rem; 
        font-weight: 600; text-transform: uppercase; letter-spacing: 2px; 
        transition: all 0.4s ease; position: relative; padding: 5px 0;
    }
    .top-nav li a:hover, .top-nav li a.active { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    .top-nav li a::after {
        content: ''; position: absolute; width: 4px; height: 4px; bottom: -2px; left: 50%;
        transform: translateX(-50%) scale(0); background-color: var(--secondary); 
        border-radius: 50%; transition: transform 0.3s ease; box-shadow: 0 0 8px var(--secondary);
    }
    .top-nav li a:hover::after, .top-nav li a.active::after { transform: translateX(-50%) scale(1); }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #030712; }
    ::-webkit-scrollbar-thumb { background-color: rgba(30,41,59,0.8); border-radius: 10px; transition: all 0.4s ease; }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--secondary); }

    #starsCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; mix-blend-mode: screen; }

    .Projects-iframe { width: 100%; border: none; position: relative; z-index: 20; display: block; overflow: hidden; }

    /* =========================================
       TORA ROBOT
       ========================================= */
    #chuti-bot {
        position: fixed; bottom: 30px; right: 40px;
        width: 70px; height: 90px;
        z-index: 1000; pointer-events: auto; cursor: pointer;      
        filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
    }

    .chuti-name {
        position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
        font-family: 'Syncopate', sans-serif; font-size: 9px; font-weight: 700;
        color: var(--secondary); letter-spacing: 2px; text-shadow: 0 0 5px var(--secondary);
        opacity: 0.9; z-index: 20; transition: color 0.4s ease, text-shadow 0.4s ease;
    }

    .chuti-shadow {
        position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
        width: 50px; height: 8px; background: rgba(0,255,204,0.2);
        border-radius: 50%; filter: blur(4px);
        animation: chutiShadowPulse 3s ease-in-out infinite; transition: background 0.4s ease;
    }

    .chuti-wrapper { position: relative; width: 100%; height: 100%; animation: chutiFloat 3s ease-in-out infinite; }

    .chuti-body, .chuti-head, .chuti-arm, .chuti-leg, .chuti-ear, .chuti-core, .chuti-eye {
        transition: background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    }

    .chuti-body {
        position: absolute; top: 45px; left: 50%; margin-left: -18px;
        width: 36px; height: 32px;
        background: linear-gradient(135deg, var(--bot-light), var(--bot-main));
        border-radius: 15px 15px 10px 10px; border: 2px solid #475569;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        display: flex; align-items: center; justify-content: center; z-index: 5;
    }

    .chuti-core {
        width: 10px; height: 10px; background: var(--primary);
        border-radius: 50%; box-shadow: 0 0 10px var(--primary), inset 0 0 4px #fff;
        animation: heartBeat 1.5s infinite;
    }

    .chuti-head {
        position: absolute; top: 5px; left: 50%; margin-left: -28px;
        width: 56px; height: 42px;
        background: linear-gradient(145deg, #cbd5e1, #94a3b8);
        border-radius: 25px 25px 18px 18px; border: 2px solid #64748b;
        box-shadow: 0 5px 10px rgba(0,0,0,0.4), inset 0 2px 5px #fff;
        z-index: 10; display: flex; justify-content: center; align-items: center;
        will-change: transform; transform-origin: center bottom;
    }

    .chuti-visor {
        width: 80%; height: 22px; background: #020617;
        border-radius: 10px; border: 2px solid #1e293b;
        display: flex; justify-content: center; align-items: center;
        overflow: hidden; position: relative;
    }

    .chuti-eyes-container { display: flex; gap: 12px; will-change: transform; }

    .chuti-eye {
        width: 8px; height: 12px; background: var(--secondary);
        border-radius: 10px; box-shadow: 0 0 8px var(--secondary), 0 0 15px #fff;
        animation: cuteBlink 4s infinite;
    }

    .chuti-cheek { position: absolute; bottom: 2px; width: 6px; height: 3px; background: rgba(255,51,102,0.6); border-radius: 5px; filter: blur(1px); }
    .chuti-cheek.left { left: 4px; }
    .chuti-cheek.right { right: 4px; }

    .chuti-ear { position: absolute; top: 15px; width: 6px; height: 12px; background: var(--bot-main); border-radius: 3px; border: 1px solid #475569; }
    .chuti-ear.left { left: -6px; border-radius: 5px 0 0 5px; border-right: none; }
    .chuti-ear.right { right: -6px; border-radius: 0 5px 5px 0; border-left: none; }

    .chuti-arm {
        position: absolute; top: 50px; width: 10px; height: 22px;
        background: linear-gradient(to bottom, var(--bot-light), var(--bot-main));
        border-radius: 5px; border: 1px solid #475569; z-index: 6;
        animation: armSwing 3s ease-in-out infinite;
    }
    .chuti-arm.left { left: 8px; transform-origin: top center; }
    .chuti-arm.right { right: 8px; transform-origin: top center; animation-delay: 1.5s; }

    .chuti-leg {
        position: absolute; bottom: 0px; width: 12px; height: 18px;
        background: var(--bot-main); border-radius: 4px 4px 8px 8px;
        border: 1px solid #475569; z-index: 4;
        animation: legDangle 3s ease-in-out infinite;
    }
    .chuti-leg.left { left: 20px; transform-origin: top center; }
    .chuti-leg.right { right: 20px; transform-origin: top center; animation-delay: 1.5s; }

    #chuti-bot.tora-active .chuti-name { color: #00ffcccc; text-shadow: 0 0 10px #22c55e; opacity: 0; } 
    #chuti-bot.tora-active .chuti-head { background: linear-gradient(145deg, #bbf7d0, #4ade80); border-color: #16a34a; }
    #chuti-bot.tora-active .chuti-body { background: linear-gradient(135deg, #15803d, #14532d); border-color: #22c55e; }
    #chuti-bot.tora-active .chuti-arm, #chuti-bot.tora-active .chuti-leg, #chuti-bot.tora-active .chuti-ear { background: #14532d; border-color: #22c55e; }
    #chuti-bot.tora-active .chuti-eye { background: #22c55e; box-shadow: 0 0 10px #22c55e, 0 0 20px #fff; }
    #chuti-bot.tora-active .chuti-core { background: #22c55e; box-shadow: 0 0 15px #22c55e, inset 0 0 5px #fff; }
    #chuti-bot.tora-active .chuti-shadow { background: rgba(34,197,94,0.3); }

    @keyframes cuteBlink { 0%, 90%, 94%, 100% { transform: scaleY(1); } 92%, 96% { transform: scaleY(0.1); } }

    @keyframes armSwing { 0%, 100% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } }
    @keyframes legDangle { 0%, 100% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } }

       TORA CHAT PANEL

    .t-msg { display: flex; gap: 7px; align-items: flex-end; animation: msgPop 0.3s cubic-bezier(0.22,1,0.36,1) both; }

    .tora-chips { display: flex; gap: 5px; flex-wrap: wrap; padding: 0 11px 8px; }
    .t-chip {

    .tora-input-row {
        display: flex; align-items: flex-end; gap: 7px;

    #tora-input {
        flex: 1; background: transparent; border: none; outline: none;
        color: #e2e8f0; font-family: 'Space Grotesk', sans-serif;

    .tora-send-btn {

        background: linear-gradient(135deg,#22c55e,#16a34a);
        border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;

    .tora-send-btn:active { transform: scale(0.95); }
    .tora-send-btn svg { width: 13px; height: 13px; fill: #022c14; }

    /* =========================================
       RESUME BUTTON
       ========================================= */
    .resume-btn {
        position: fixed; top: 30px; right: 40px; z-index: 1000;
        padding: 12px 24px;
        background: rgba(15,23,42,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0,255,204,0.5); border-radius: 10px;
        color: var(--text-main); font-family: 'Space Grotesk', sans-serif;
        font-size: 12px; font-weight: 600; text-decoration: none;
        text-transform: uppercase; letter-spacing: 2px;
        display: flex; align-items: center; justify-content: center; overflow: hidden;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 10px rgba(0,255,204,0.2);
    }
    .resume-btn:hover {

</style>

<script>
// =========================================
// STARS
// =========================================
const canvas = document.getElementById('starsCanvas');
const ctx    = canvas.getContext('2d');
const hero   = document.querySelector('.hero-section');
let stars    = [];

function resize() { canvas.width = hero.offsetWidth; canvas.height = hero.offsetHeight; }

class Star {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.5 + 0.2;
        this.baseAlpha = Math.random() * 0.5 + 0.1;
        this.pulseSpeed = Math.random() * 0.02 + 0.005;
        this.angle = Math.random() * Math.PI * 2;
    }
    update() {
        this.angle += this.pulseSpeed;
        this.alpha = Math.min(1, Math.max(0, this.baseAlpha + Math.sin(this.angle) * 0.5));
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
        ctx.shadowBlur = this.alpha > 0.6 ? 6 : 0;
        ctx.shadowColor = "rgba(255,255,255,0.8)";
        ctx.fill();
    }
}

function initStars() { stars = []; for (let i = 0; i < 200; i++) stars.push(new Star()); }
function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => { s.update(); s.draw(); });
    requestAnimationFrame(animateStars);
}
window.addEventListener('resize', resize);
resize(); initStars(); animateStars();

// =========================================
// NAV SCROLL HIGHLIGHT
// =========================================
window.addEventListener('scroll', () => {
    let cur = '';
    document.querySelectorAll('#aboutme,#Projects,#education,#more,#contact').forEach(s => {
        if (pageYOffset >= s.offsetTop - 250) cur = s.id;
    });
    document.querySelectorAll('.top-nav a').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href').includes(cur) && !!cur);
    });
});

window.addEventListener('message', e => {
    if (e.data?.type === 'resize') {
        document.querySelectorAll('.Projects-iframe').forEach(f => {
            if (e.data.url.includes(f.getAttribute('src'))) f.style.height = e.data.height + 'px';
        });
    }
});

function slowScrollTo(id, dur) {
    document.documentElement.style.scrollBehavior = 'auto';
    const t = document.getElementById(id); if (!t) return;
    const start = window.pageYOffset;
    const dist  = t.getBoundingClientRect().top;
    let t0 = null;
    (function step(now) {
        if (!t0) t0 = now;
        const el = now - t0;
        const p  = Math.min(el / dur, 1);
        const ease = p < 0.5 ? 2*p*p : -1+4*p-2*p*p;
        window.scrollTo(0, start + dist * ease);
        if (el < dur) requestAnimationFrame(step);
        else document.documentElement.style.scrollBehavior = 'smooth';
    })(performance.now());
}

// Keyword → intent mapping
const INTENT_MAP = [
    { key: 'hi',       words: ['hi','hello','hey','sup','greetings','hola'] },
    { key: 'thanks',   words: ['thanks','thank','thx','appreciate','cheers'] },
    { key: 'who',      words: ['who','malith','about','introduce','yourself','person','tell me'] },
    { key: 'degree',   words: ['degree','university','susl','study','studying','education','chemical','bsc','qual'] },
    { key: 'webdev',   words: ['web','html','css','javascript','js','php','mysql','code','coding','programming','dev','stack','language'] },
    { key: 'design',   words: ['design','photoshop','illustrator','graphic','adobe','art','creative','ui','ux'] },
    { key: 'projects', words: ['project','projects','safeheaven','greenchain','built','work','portfolio','apps','app'] },
    { key: 'setup',    words: ['setup','laptop','asus','rtx','computer','machine','pc','spec','hardware','gear'] },
    { key: 'contact',  words: ['contact','email','reach','hire','freelance','available','message','connect','dm'] },
];

function detectIntent(msg) {
    const lower = msg.toLowerCase();
    for (const { key, words } of INTENT_MAP) {
        if (words.some(w => lower.includes(w))) return key;
    }
    return null;
}

// =========================================
// CHAT UI
// =========================================
const chatPanel  = document.getElementById('tora-chat-panel');
const msgBox     = document.getElementById('tora-messages');
const chipsEl    = document.getElementById('tora-chips');
const chutiBot   = document.getElementById('chuti-bot');
let chatOpened   = false;

// Open on robot click
chutiBot.addEventListener('click', e => {
    if (e.target.closest('.tora-chat-panel')) return;
    chatPanel.classList.add('show');
    if (!chatOpened) {
        chatOpened = true;
        showMsg('bot', "Hey! I'm TORA 🤖 Malith's little robot buddy. Pick a question below or type anything!");
    }
});

function closeChat(e) { e.stopPropagation(); chatPanel.classList.remove('show'); }

// Chip click → known answer
function askQ(key) {
    chipsEl.style.display = 'none';
    showMsg('user', chipLabel(key));
    showTyping(() => showMsg('bot', KNOWLEDGE[key]));
}

function chipLabel(k) {
    return { who:'Who is Malith?', degree:'His degree?', webdev:'Web Dev skills?',
             design:'Design skills?', projects:'Top projects?', setup:'His setup?',
             contact:'Contact info?' }[k] || k;
}

// Typed message handler
function handleTyped() {
    const input = document.getElementById('tora-input');
    const msg   = input.value.trim();
    if (!msg) return;
    chipsEl.style.display = 'none';
    showMsg('user', msg);
    input.value = '';
    autoResize(input);

    const key = detectIntent(msg);
    showTyping(() => {
        showMsg('bot', key
            ? KNOWLEDGE[key]
            : "Hmm, not sure about that one! 🤔 Try asking about Malith's skills, projects, degree, setup or how to contact him."
        );
    });
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleTyped(); }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 70) + 'px';
}

// Render helpers
function showMsg(role, text) {
    const row = document.createElement('div');
    row.className = `t-msg ${role}`;
    row.innerHTML = `<div class="t-msg-icon ${role}">${role === 'bot' ? '🤖' : '🧑'}</div>
                     <div class="t-bubble">${esc(text)}</div>`;
    msgBox.appendChild(row);
    msgBox.scrollTop = msgBox.scrollHeight;
}

function showTyping(cb) {
    const row = document.createElement('div');
    row.className = 't-msg bot';
    row.innerHTML = `<div class="t-msg-icon bot">🤖</div>
                     <div class="typing-dots"><span></span><span></span><span></span></div>`;
    msgBox.appendChild(row);
    msgBox.scrollTop = msgBox.scrollHeight;
    setTimeout(() => { row.remove(); cb(); }, 850);
}

function esc(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// =========================================
// MOUSE TRACKING (head & eyes follow cursor)
// =========================================
const chutiHead = document.getElementById('chuti-head');
const chutiEyes = document.getElementById('chuti-eyes');
let cx=0, cy=0, tx=0, ty=0, rx=window.innerWidth/2, ry=window.innerHeight/2;

function updateMouse(x, y) {
    rx = x; ry = y;
    tx = ((x / window.innerWidth)  - 0.5) * 2;
    ty = ((y / window.innerHeight) - 0.5) * 2;
}

document.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));

document.querySelectorAll('.Projects-iframe').forEach(f => {
    f.addEventListener('load', () => {
        try {
            f.contentWindow.document.addEventListener('mousemove', e => {
                const r = f.getBoundingClientRect();
                updateMouse(e.clientX + r.left, e.clientY + r.top);
            });
        } catch(_) {}
    });
});

function animateChuti() {
    const r    = chutiBot.getBoundingClientRect();
    const dist = Math.hypot(rx - (r.left + r.width/2), ry - (r.top + r.height/2));
    chutiBot.classList.toggle('tora-active', dist < 150);

    cx += (tx - cx) * 0.1;
    cy += (ty - cy) * 0.1;

    chutiHead.style.transform = `translate(${cx*8}px,${cy*5}px) rotate(${cx*15}deg)`;
    chutiEyes.style.transform = `translate(${cx*10}px,${cy*4}px)`;

    requestAnimationFrame(animateChuti);
}
animateChuti();
</script>
