<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Malith Eranga</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syncopate:wght@600&display=swap" rel="stylesheet">
<style>
:root {
--primary: #3b82f6;
--secondary: #00ffcc; 
--bg-overlay: rgba(4, 8, 18, 0);
--text-main: #f8fafc;
--text-muted: #cbd5e1;
}

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeInPage {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    @keyframes navSlideDown {
        0% { opacity: 0; transform: translate(-50%, -30px); }
        100% { opacity: 1; transform: translate(-50%, 0); }
    }

    html {
        background-color: #030712; 
        width: 100%; height: 100%;
        scroll-behavior: smooth;
    }

    body {
        width: 100%; height: 100%;
        background-color: #030712; 
        font-family: 'Space Grotesk', sans-serif;
        color: var(--text-main);
        overflow-x: hidden;
        opacity: 0;
        animation: fadeInPage 2s ease-in-out forwards;
    }

    /* --- Hero Section with original background at full opacity --- */
    .hero-section {
        position: relative;
        width: 100%;
        min-height: 800px; 
        /* Linear gradient overlay removed to restore original look */
        background: url('Backgrounds/background1.png');
        background-size: cover;
        background-position: center; 
        background-repeat: no-repeat;
        overflow: hidden;
    }

    /* --- High-End Centered Navigation --- */
    .top-nav {
        position: fixed;
        top: 30px;
        left: 50%; 
        z-index: 100;
        background: rgba(15, 23, 42, 0.3);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: 2px solid var(--secondary); /* Green laser theme removed, gold restored */
        border-radius: 30px; /* Pill shape for modern look */
        padding: 10px 30px; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        
        opacity: 0;
        animation: navSlideDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; 
    }

    .top-nav ul {
        list-style: none;
        display: flex;
        gap: 25px; 
        align-items: center;
    }

    .top-nav li a {
        text-decoration: none;
        color: var(--text-muted);
        font-size: 0.75rem; 
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px; 
        transition: all 0.4s ease;
        position: relative;
        padding: 5px 0;
    }

    .top-nav li a:hover, .top-nav li a.active {
        color: #fff;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    /* Glowing dot indicator */
    .top-nav li a::after {
        content: '';
        position: absolute;
        width: 4px;
        height: 4px;
        bottom: -2px;
        left: 50%;
        transform: translateX(-50%) scale(0);
        background-color: var(--secondary); /* Green laser theme removed, gold restored */
        border-radius: 50%;
        transition: transform 0.3s ease;
        box-shadow: 0 0 8px var(--secondary);
    }

    .top-nav li a:hover::after, .top-nav li a.active::after {
        transform: translateX(-50%) scale(1);
    }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #030712; }
    ::-webkit-scrollbar-thumb {
        background-color: rgba(30, 41, 59, 0.8);
        border-radius: 10px;
        transition: all 0.4s ease;
    }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--secondary); }

    /* --- Stars Canvas --- */
    #starsCanvas {
        position: absolute; 
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1; 
        pointer-events: none; 
        mix-blend-mode: screen;
    }

    .Projects-iframe {
        width: 100%;
        border: none;
        position: relative;
        z-index: 20; 
        display: block;
        overflow: hidden;
    }
</style>
</head>
<body>

<div class="hero-section" id="aboutme">
    <canvas id="starsCanvas"></canvas>
</div>

<nav class="top-nav">
    <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="#aboutme">About Me</a></li>
        <li><a href="#Projects">Projects</a></li>
        <li><a href="#education">Qualifications</a></li>
        <li><a href="#more">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<iframe id="Projects" src="Projects.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="education" src="Education.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="more" src="Skills.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="contact" src="Contact.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>

<script>
    // --- Advanced Particle Stars Effect remains ---
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    const heroSection = document.querySelector('.hero-section');
    let stars = [];

    function resize() {
        canvas.width = heroSection.offsetWidth;
        canvas.height = heroSection.offsetHeight;
    }

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.2; 
            this.baseAlpha = Math.random() * 0.5 + 0.1;
            this.pulseSpeed = Math.random() * 0.02 + 0.005;
            this.angle = Math.random() * Math.PI * 2; 
        }
        update() {
            this.angle += this.pulseSpeed;
            this.alpha = this.baseAlpha + Math.sin(this.angle) * 0.5;
            if (this.alpha < 0) this.alpha = 0;
            if (this.alpha > 1) this.alpha = 1;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            if (this.alpha > 0.6) {
                ctx.shadowBlur = 6;
                ctx.shadowColor = "rgba(255, 255, 255, 0.8)";
            } else {
                ctx.shadowBlur = 0;
            }
            ctx.fill();
        }
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 200; i++) stars.push(new Star());
    }

    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => { star.update(); star.draw(); });
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', resize);
    resize();
    initStars();
    animateStars();

    // --- Navigation Scroll Logic ---
    const navLinks = document.querySelectorAll('.top-nav ul li a');
    window.addEventListener('scroll', () => {
        let current = '';
        const sections = document.querySelectorAll('#aboutme, #Projects, #education, #more, #contact');

        sections.forEach(section => {
            const sectionTop = section.offsetTop;
            if (pageYOffset >= sectionTop - 250) {
                current = section.getAttribute('id');
            }
        });

        navLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href').includes(current) && current !== '') {
                link.classList.add('active');
            }
        });
    });

   window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'resize') {
        const iframes = document.querySelectorAll('.Projects-iframe');
        iframes.forEach(iframe => {
            if (event.data.url.includes(iframe.getAttribute('src'))) {
                iframe.style.height = event.data.height + 'px'; 
            }
        });
    }
});
</script>
</body>
</html>
