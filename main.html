<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Malith Eranga</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syncopate:wght@600&display=swap" rel="stylesheet">
<style>
:root {
--primary: #3b82f6;
--secondary: #00ffcc; 
--alert: #ff3366; /* New alert color */
--bg-overlay: rgba(4, 8, 18, 0);
--text-main: #f8fafc;
--text-muted: #cbd5e1;
--quantum-dark: rgba(10, 15, 30, 0.7);
--quantum-border: rgba(0, 255, 204, 0.3);
}

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeInPage {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    @keyframes navSlideDown {
        0% { opacity: 0; transform: translate(-50%, -30px); }
        100% { opacity: 1; transform: translate(-50%, 0); }
    }

    html {
        background-color: #030712; 
        width: 100%; height: 100%;
        scroll-behavior: smooth;
    }

    body {
        width: 100%; height: 100%;
        background-color: #030712; 
        font-family: 'Space Grotesk', sans-serif;
        color: var(--text-main);
        overflow-x: hidden;
        opacity: 0;
        animation: fadeInPage 2s ease-in-out forwards;
    }

    /* --- Hero Section --- */
    .hero-section {
        position: relative;
        width: 100%;
        min-height: 800px; 
        background: url('Backgrounds/background1.png');
        background-size: cover;
        background-position: center; 
        background-repeat: no-repeat;
        overflow: hidden;
    }

    /* --- High-End Centered Navigation --- */
    .top-nav {
        position: fixed;
        top: 30px;
        left: 50%; 
        z-index: 100;
        background: rgba(15, 23, 42, 0.3);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: 2px solid var(--secondary); 
        border-radius: 30px; 
        padding: 10px 30px; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        opacity: 0;
        animation: navSlideDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; 
    }

    .top-nav ul { list-style: none; display: flex; gap: 25px; align-items: center; }
    .top-nav li a {
        text-decoration: none; color: var(--text-muted); font-size: 0.75rem; 
        font-weight: 600; text-transform: uppercase; letter-spacing: 2px; 
        transition: all 0.4s ease; position: relative; padding: 5px 0;
    }
    .top-nav li a:hover, .top-nav li a.active { color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
    .top-nav li a::after {
        content: ''; position: absolute; width: 4px; height: 4px; bottom: -2px; left: 50%;
        transform: translateX(-50%) scale(0); background-color: var(--secondary); 
        border-radius: 50%; transition: transform 0.3s ease; box-shadow: 0 0 8px var(--secondary);
    }
    .top-nav li a:hover::after, .top-nav li a.active::after { transform: translateX(-50%) scale(1); }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #030712; }
    ::-webkit-scrollbar-thumb {
        background-color: rgba(30, 41, 59, 0.8); border-radius: 10px; transition: all 0.4s ease;
    }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--secondary); }

    /* --- Stars Canvas --- */
    #starsCanvas {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1; pointer-events: none; mix-blend-mode: screen;
    }

    .Projects-iframe {
        width: 100%; border: none; position: relative; z-index: 20; 
        display: block; overflow: hidden;
    }

    /* =========================================
       ULTRA-PREMIUM QUANTUM AI ENTITY 
       ========================================= */
    #quantum-ai {
        position: fixed;
        bottom: 35px;
        right: 60px;
        width: 140px;
        height: 180px;
        z-index: 1000;
        pointer-events: none;
        perspective: 800px; /* 3D depth */
    }

    /* Holographic Base Pad */
    .holo-pad {
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%) rotateX(70deg);
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 2px dashed rgba(0, 255, 204, 0.4);
        box-shadow: 0 0 20px rgba(0, 255, 204, 0.2), inset 0 0 30px rgba(59, 130, 246, 0.3);
        animation: spinPad 10s linear infinite;
    }
    .holo-pad::after {
        content: ''; position: absolute; top: 20%; left: 20%; width: 60%; height: 60%;
        border-radius: 50%; border: 1px solid var(--primary); animation: spinPad reverse 5s linear infinite;
    }

    /* Body Container - Handles breathing */
    .ai-body-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        animation: quantumFloat 4s ease-in-out infinite;
        will-change: transform;
    }

    /* Magnetic Energy Rings */
    .magnetic-ring {
        position: absolute;
        top: 60px;
        left: 50%;
        width: 120px;
        height: 120px;
        margin-left: -60px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-top: 2px solid var(--secondary);
        border-bottom: 2px solid var(--primary);
        transform-style: preserve-3d;
        opacity: 0.6;
        box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
    }
    .magnetic-ring.r1 { animation: spinRing1 6s linear infinite; }
    .magnetic-ring.r2 { width: 90px; height: 90px; top: 75px; margin-left: -45px; animation: spinRing2 4s linear infinite; border-top-color: var(--primary); border-bottom-color: var(--secondary); }

    /* Quantum Core Orb */
    .ai-core {
        position: absolute;
        top: 90px;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 30px;
        height: 30px;
        background: radial-gradient(circle, #fff 10%, var(--secondary) 40%, var(--primary) 80%);
        border-radius: 50%;
        box-shadow: 0 0 25px var(--secondary), 0 0 50px var(--primary);
        animation: corePulse 2s ease-in-out infinite alternate;
        z-index: 5;
    }

    /* Geometric Armor Shards (Floating around core) */
    .armor-shard {
        position: absolute;
        background: var(--quantum-dark);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--quantum-border);
        box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        z-index: 4;
        transition: all 0.3s ease;
    }

    .shard-chest {
        top: 65px; left: 50%; margin-left: -25px;
        width: 50px; height: 55px;
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .shard-shoulder {
        top: 75px; width: 20px; height: 35px;
    }
    .shard-shoulder.left { left: 15px; clip-path: polygon(0 0, 100% 20%, 80% 100%, 20% 80%); transform: rotate(15deg); }
    .shard-shoulder.right { right: 15px; clip-path: polygon(100% 0, 0 20%, 20% 100%, 80% 80%); transform: rotate(-15deg); }

    .shard-leg {
        bottom: 25px; width: 35px; height: 25px;
    }
    .shard-leg.left { left: 25px; clip-path: polygon(20% 0, 100% 20%, 80% 100%, 0 80%); transform: rotate(20deg); }
    .shard-leg.right { right: 25px; clip-path: polygon(0 20%, 80% 0, 100% 80%, 20% 100%); transform: rotate(-20deg); }

    /* High-Tech Head */
    .ai-head-wrapper {
        position: absolute;
        top: 10px;
        left: 50%;
        margin-left: -35px;
        width: 70px;
        height: 50px;
        z-index: 10;
        will-change: transform;
        transform-style: preserve-3d;
    }

    .ai-head-shape {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.95));
        border: 1px solid var(--primary);
        border-top: 2px solid var(--secondary);
        clip-path: polygon(20% 0%, 80% 0%, 100% 40%, 80% 100%, 20% 100%, 0% 40%);
        box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        transition: border-color 0.4s ease;
    }

    /* Visor & Glowing Eyes */
    .ai-visor {
        width: 80%;
        height: 18px;
        background: #000;
        border-radius: 4px;
        box-shadow: inset 0 0 10px rgba(0,255,204,0.3);
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .ai-visor-grid {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-image: linear-gradient(rgba(0, 255, 204, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 204, 0.1) 1px, transparent 1px);
        background-size: 4px 4px; z-index: 1;
    }

    .ai-eyes-container {
        display: flex; gap: 8px; z-index: 2; will-change: transform;
    }

    .ai-eye {
        width: 12px; height: 4px;
        background: var(--secondary);
        border-radius: 5px;
        box-shadow: 0 0 10px var(--secondary), 0 0 20px #fff;
        transition: background 0.4s ease, box-shadow 0.4s ease, height 0.1s ease;
    }

    /* Scanning Laser Line */
    .laser-scan {
        position: absolute; left: 0; width: 100%; height: 1px;
        background: var(--secondary); box-shadow: 0 0 8px var(--secondary);
        z-index: 3; animation: scanVisor 2.5s infinite linear; opacity: 0.7;
    }

    /* --- ALERT STATE CLASSES (Triggered via JS) --- */
    #quantum-ai.alert-mode .ai-eye { background: var(--alert); box-shadow: 0 0 15px var(--alert), 0 0 25px #fff; }
    #quantum-ai.alert-mode .ai-head-shape { border-color: var(--alert); }
    #quantum-ai.alert-mode .laser-scan { background: var(--alert); box-shadow: 0 0 8px var(--alert); }
    #quantum-ai.alert-mode .ai-core { background: radial-gradient(circle, #fff 10%, var(--alert) 40%, #800020 80%); box-shadow: 0 0 30px var(--alert); animation: corePulseFast 0.5s infinite alternate; }

    /* --- Animations --- */
    @keyframes quantumFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes spinPad { 100% { transform: translateX(-50%) rotateX(70deg) rotateZ(360deg); } }
    @keyframes spinRing1 { 0% { transform: rotateX(65deg) rotateY(15deg) rotateZ(0deg); } 100% { transform: rotateX(65deg) rotateY(15deg) rotateZ(360deg); } }
    @keyframes spinRing2 { 0% { transform: rotateX(75deg) rotateY(-15deg) rotateZ(360deg); } 100% { transform: rotateX(75deg) rotateY(-15deg) rotateZ(0deg); } }
    @keyframes corePulse { 0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; } }
    @keyframes corePulseFast { 0% { transform: translate(-50%, -50%) scale(0.9); } 100% { transform: translate(-50%, -50%) scale(1.2); } }
    @keyframes scanVisor { 0% { top: -2px; } 50% { top: 20px; } 100% { top: -2px; } }
</style>
</head>
<body>

<div class="hero-section" id="aboutme">
    <canvas id="starsCanvas"></canvas>
</div>

<nav class="top-nav">
    <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="#aboutme">About</a></li>
        <li><a href="#Projects">Projects</a></li>
        <li><a href="#education">Qualifications</a></li>
        <li><a href="#more">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<div id="quantum-ai">
    <div class="holo-pad"></div>
    
    <div class="ai-body-wrapper" id="ai-body">
        <div class="magnetic-ring r1"></div>
        <div class="magnetic-ring r2"></div>
        
        <div class="ai-core"></div>
        
        <div class="armor-shard shard-shoulder left"></div>
        <div class="armor-shard shard-shoulder right"></div>
        <div class="armor-shard shard-chest"></div>
        <div class="armor-shard shard-leg left"></div>
        <div class="armor-shard shard-leg right"></div>
        
        <div class="ai-head-wrapper" id="ai-head">
            <div class="ai-head-shape">
                <div class="ai-visor">
                    <div class="ai-visor-grid"></div>
                    <div class="laser-scan"></div>
                    <div class="ai-eyes-container" id="ai-eyes">
                        <div class="ai-eye"></div>
                        <div class="ai-eye"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<iframe id="Projects" src="Projects.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="education" src="Education.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="more" src="Skills.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="contact" src="Contact.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>

<script>
    // --- Stars Effect ---
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    const heroSection = document.querySelector('.hero-section');
    let stars = [];

    function resize() {
        canvas.width = heroSection.offsetWidth;
        canvas.height = heroSection.offsetHeight;
    }

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.2; 
            this.baseAlpha = Math.random() * 0.5 + 0.1;
            this.pulseSpeed = Math.random() * 0.02 + 0.005;
            this.angle = Math.random() * Math.PI * 2; 
        }
        update() {
            this.angle += this.pulseSpeed;
            this.alpha = this.baseAlpha + Math.sin(this.angle) * 0.5;
            if (this.alpha < 0) this.alpha = 0; if (this.alpha > 1) this.alpha = 1;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            if (this.alpha > 0.6) { ctx.shadowBlur = 6; ctx.shadowColor = "rgba(255, 255, 255, 0.8)"; } 
            else { ctx.shadowBlur = 0; }
            ctx.fill();
        }
    }

    function initStars() { stars = []; for (let i = 0; i < 200; i++) stars.push(new Star()); }
    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => { star.update(); star.draw(); });
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', resize); resize(); initStars(); animateStars();

    // --- Navigation Logic ---
    const navLinks = document.querySelectorAll('.top-nav ul li a');
    window.addEventListener('scroll', () => {
        let current = '';
        const sections = document.querySelectorAll('#aboutme, #Projects, #education, #more, #contact');
        sections.forEach(section => {
            const sectionTop = section.offsetTop;
            if (pageYOffset >= sectionTop - 250) { current = section.getAttribute('id'); }
        });
        navLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href').includes(current) && current !== '') { link.classList.add('active'); }
        });
    });

   window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'resize') {
        const iframes = document.querySelectorAll('.Projects-iframe');
        iframes.forEach(iframe => {
            if (event.data.url.includes(iframe.getAttribute('src'))) {
                iframe.style.height = event.data.height + 'px'; 
            }
        });
    }
   });

    // =========================================
    // ADVANCED 3D PHYSICS & PROXIMITY TRACKING
    // =========================================
    const quantumAi = document.getElementById('quantum-ai');
    const aiBody = document.getElementById('ai-body');
    const aiHead = document.getElementById('ai-head');
    const aiEyes = document.getElementById('ai-eyes');

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    
    // Smooth variables
    let currentX = 0, currentY = 0;
    let targetX = 0, targetY = 0;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        targetX = ((mouseX / window.innerWidth) - 0.5) * 2;
        targetY = ((mouseY / window.innerHeight) - 0.5) * 2;
    });

    function animateAI() {
        if (quantumAi && aiHead && aiEyes) {
            // Smooth Spring Interpolation
            currentX += (targetX - currentX) * 0.06;
            currentY += (targetY - currentY) * 0.06;
            
            // --- 1. Proximity Alert System ---
            const rect = quantumAi.getBoundingClientRect();
            const aiCenterX = rect.left + rect.width / 2;
            const aiCenterY = rect.top + rect.height / 2;
            
            // Calculate real distance to mouse
            const dist = Math.hypot(mouseX - aiCenterX, mouseY - aiCenterY);
            
            // If mouse is within 250px, activate defense/alert mode
            if (dist < 250) {
                quantumAi.classList.add('alert-mode');
            } else {
                quantumAi.classList.remove('alert-mode');
            }

            // --- 2. 3D Body Parallax (Subtle) ---
            aiBody.style.transform = `
                rotateY(${currentX * 10}deg) 
                rotateX(${currentY * -10}deg)
            `;

            // --- 3. Advanced Head Tracking ---
            const headTranslateX = currentX * 12; 
            const headTranslateY = currentY * 8; 
            const headRotateZ = currentX * 15;
            
            aiHead.style.transform = `
                translate3d(${headTranslateX}px, ${headTranslateY}px, 20px) 
                rotateY(${currentX * 25}deg) 
                rotateX(${currentY * -15}deg)
                rotateZ(${headRotateZ}deg)
            `;

            // --- 4. Visor Eyes Movement ---
            const eyeX = currentX * 10;
            const eyeY = currentY * 4;
            aiEyes.style.transform = `translate(${eyeX}px, ${eyeY}px)`;
        }
        requestAnimationFrame(animateAI);
    }
    
    // Start AI Loop
    animateAI();
</script>
</body>
</html>
