<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Malith Eranga</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syncopate:wght@600&display=swap" rel="stylesheet">
<style>
:root {
--primary: #3b82f6;
--secondary: #00ffcc; 
--bg-overlay: rgba(4, 8, 18, 0);
--text-main: #f8fafc;
--text-muted: #cbd5e1;
--bot-main: #1e293b;
--bot-light: #334155;
--bot-glow: #00ffcccc;
}

    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes fadeInPage {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    @keyframes navSlideDown {
        0% { opacity: 0; transform: translate(-50%, -30px); }
        100% { opacity: 1; transform: translate(-50%, 0); }
    }

    html {
        background-color: #030712; 
        width: 100%; height: 100%;
        scroll-behavior: smooth;
    }

    body {
        width: 100%; height: 100%;
        background-color: #030712; 
        font-family: 'Space Grotesk', sans-serif;
        color: var(--text-main);
        overflow-x: hidden;
        opacity: 0;
        animation: fadeInPage 2s ease-in-out forwards;
    }

    .hero-section {
        position: relative;
        width: 100%;
        min-height: 800px; 
        background: url('Backgrounds/background1.png');
        background-size: cover;
        background-position: center; 
        background-repeat: no-repeat;
        overflow: hidden;
    }

    .top-nav {
        position: fixed;
        top: 30px;
        left: 50%; 
        z-index: 100;
        background: rgba(15, 23, 42, 0.3);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: 2px solid var(--secondary); 
        border-radius: 30px; 
        padding: 10px 30px; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        opacity: 0;
        animation: navSlideDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; 
    }

    .top-nav ul { list-style: none; display: flex; gap: 25px; align-items: center; }
    .top-nav li a {
        text-decoration: none; color: var(--text-muted); font-size: 0.75rem; 
        font-weight: 600; text-transform: uppercase; letter-spacing: 2px; 
        transition: all 0.4s ease; position: relative; padding: 5px 0;
    }
    .top-nav li a:hover, .top-nav li a.active { color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
    .top-nav li a::after {
        content: ''; position: absolute; width: 4px; height: 4px; bottom: -2px; left: 50%;
        transform: translateX(-50%) scale(0); background-color: var(--secondary); 
        border-radius: 50%; transition: transform 0.3s ease; box-shadow: 0 0 8px var(--secondary);
    }
    .top-nav li a:hover::after, .top-nav li a.active::after { transform: translateX(-50%) scale(1); }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #030712; }
    ::-webkit-scrollbar-thumb {
        background-color: rgba(30, 41, 59, 0.8); border-radius: 10px; transition: all 0.4s ease;
    }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--secondary); }

    #starsCanvas {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1; pointer-events: none; mix-blend-mode: screen;
    }

    .Projects-iframe {
        width: 100%; border: none; position: relative; z-index: 20; 
        display: block; overflow: hidden;
    }

    /* =========================================
       TORA ROBOT
       ========================================= */
    #chuti-bot {
        position: fixed;
        bottom: 30px;
        right: 40px;
        width: 70px;
        height: 90px;
        z-index: 1000;
        pointer-events: auto; 
        cursor: pointer;      
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
    }

    .chuti-name {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Syncopate', sans-serif;
        font-size: 9px;
        font-weight: 700;
        color: var(--secondary);
        letter-spacing: 2px;
        text-shadow: 0 0 5px var(--secondary);
        opacity: 0.9;
        z-index: 20;
        transition: color 0.4s ease, text-shadow 0.4s ease;
    }

    .chuti-shadow {
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 8px;
        background: rgba(0, 255, 204, 0.2);
        border-radius: 50%;
        filter: blur(4px);
        animation: chutiShadowPulse 3s ease-in-out infinite;
        transition: background 0.4s ease;
    }

    .chuti-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        animation: chutiFloat 3s ease-in-out infinite;
    }

    .chuti-body, .chuti-head, .chuti-arm, .chuti-leg, .chuti-ear, .chuti-core, .chuti-eye {
        transition: background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
    }

    .chuti-body {
        position: absolute;
        top: 45px;
        left: 50%;
        margin-left: -18px;
        width: 36px;
        height: 32px;
        background: linear-gradient(135deg, var(--bot-light), var(--bot-main));
        border-radius: 15px 15px 10px 10px;
        border: 2px solid #475569;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
    }

    .chuti-core {
        width: 10px;
        height: 10px;
        background: var(--primary);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--primary), inset 0 0 4px #fff;
        animation: heartBeat 1.5s infinite;
    }

    .chuti-head {
        position: absolute;
        top: 5px;
        left: 50%;
        margin-left: -28px;
        width: 56px;
        height: 42px;
        background: linear-gradient(145deg, #cbd5e1, #94a3b8);
        border-radius: 25px 25px 18px 18px;
        border: 2px solid #64748b;
        box-shadow: 0 5px 10px rgba(0,0,0,0.4), inset 0 2px 5px #fff;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        will-change: transform;
        transform-origin: center bottom;
    }

    .chuti-visor {
        width: 80%;
        height: 22px;
        background: #020617;
        border-radius: 10px;
        border: 2px solid #1e293b;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }

    .chuti-eyes-container {
        display: flex;
        gap: 12px;
        will-change: transform;
    }

    .chuti-eye {
        width: 8px;
        height: 12px;
        background: var(--secondary);
        border-radius: 10px;
        box-shadow: 0 0 8px var(--secondary), 0 0 15px #fff;
        animation: cuteBlink 4s infinite;
    }

    .chuti-cheek {
        position: absolute;
        bottom: 2px;
        width: 6px;
        height: 3px;
        background: rgba(255, 51, 102, 0.6);
        border-radius: 5px;
        filter: blur(1px);
    }
    .chuti-cheek.left { left: 4px; }
    .chuti-cheek.right { right: 4px; }

    .chuti-ear {
        position: absolute;
        top: 15px;
        width: 6px;
        height: 12px;
        background: var(--bot-main);
        border-radius: 3px;
        border: 1px solid #475569;
    }
    .chuti-ear.left { left: -6px; border-radius: 5px 0 0 5px; border-right: none; }
    .chuti-ear.right { right: -6px; border-radius: 0 5px 5px 0; border-left: none; }

    .chuti-arm {
        position: absolute;
        top: 50px;
        width: 10px;
        height: 22px;
        background: linear-gradient(to bottom, var(--bot-light), var(--bot-main));
        border-radius: 5px;
        border: 1px solid #475569;
        z-index: 6;
        animation: armSwing 3s ease-in-out infinite;
    }
    .chuti-arm.left { left: 8px; transform-origin: top center; }
    .chuti-arm.right { right: 8px; transform-origin: top center; animation-delay: 1.5s; }

    .chuti-leg {
        position: absolute;
        bottom: 0px;
        width: 12px;
        height: 18px;
        background: var(--bot-main);
        border-radius: 4px 4px 8px 8px;
        border: 1px solid #475569;
        z-index: 4;
        animation: legDangle 3s ease-in-out infinite;
    }
    .chuti-leg.left { left: 20px; transform-origin: top center; }
    .chuti-leg.right { right: 20px; transform-origin: top center; animation-delay: 1.5s; }

    #chuti-bot.tora-active .chuti-name { color: #00ffcccc; text-shadow: 0 0 10px #22c55e; opacity: 0; } 
    #chuti-bot.tora-active .chuti-head { background: linear-gradient(145deg, #bbf7d0, #4ade80); border-color: #16a34a; }
    #chuti-bot.tora-active .chuti-body { background: linear-gradient(135deg, #15803d, #14532d); border-color: #22c55e; }
    #chuti-bot.tora-active .chuti-arm, 
    #chuti-bot.tora-active .chuti-leg, 
    #chuti-bot.tora-active .chuti-ear { background: #14532d; border-color: #22c55e; }
    #chuti-bot.tora-active .chuti-eye { background: #22c55e; box-shadow: 0 0 10px #22c55e, 0 0 20px #fff; }
    #chuti-bot.tora-active .chuti-core { background: #22c55e; box-shadow: 0 0 15px #22c55e, inset 0 0 5px #fff; }
    #chuti-bot.tora-active .chuti-shadow { background: rgba(34, 197, 94, 0.3); }

    @keyframes chutiFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes chutiShadowPulse { 0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; } 50% { transform: translateX(-50%) scale(0.7); opacity: 0.3; } }
    @keyframes cuteBlink { 0%, 90%, 94%, 100% { transform: scaleY(1); } 92%, 96% { transform: scaleY(0.1); } }
    @keyframes heartBeat { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px var(--primary); } }
    @keyframes armSwing { 0%, 100% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } }
    @keyframes legDangle { 0%, 100% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } }

    /* =========================================
       TORA FULL AI CHAT PANEL
       ========================================= */
    .tora-chat-panel {
        position: fixed;
        bottom: 130px;
        right: 30px;
        width: 320px;
        height: 460px;
        background: rgba(2, 6, 23, 0.97);
        border: 1px solid #22c55e;
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(34, 197, 94, 0.2);
        font-family: 'Space Grotesk', sans-serif;
        opacity: 0;
        pointer-events: none;
        transform: translateY(20px) scale(0.92);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .tora-chat-panel.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scale(1);
    }

    /* Chat Header */
    .tora-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        background: rgba(34, 197, 94, 0.08);
        border-bottom: 1px solid rgba(34, 197, 94, 0.25);
        flex-shrink: 0;
    }

    .tora-avatar {
        width: 34px; height: 34px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
        box-shadow: 0 0 12px rgba(34,197,94,0.5);
        flex-shrink: 0;
    }

    .tora-header-info { flex: 1; }
    .tora-header-name {
        font-size: 13px; font-weight: 700;
        color: #fff; letter-spacing: 0.04em;
    }
    .tora-header-status {
        font-size: 10px; color: #22c55e; margin-top: 1px;
    }

    .tora-close-btn {
        background: none; border: none;
        color: #64748b; cursor: pointer;
        font-size: 18px; padding: 2px 6px;
        border-radius: 6px;
        transition: all 0.2s;
        line-height: 1;
    }
    .tora-close-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

    /* Messages area */
    .tora-messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scroll-behavior: smooth;
    }

    .tora-messages::-webkit-scrollbar { width: 3px; }
    .tora-messages::-webkit-scrollbar-track { background: transparent; }
    .tora-messages::-webkit-scrollbar-thumb { background: #22c55e55; border-radius: 99px; }

    /* Message bubbles */
    .t-msg {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        animation: msgPop 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes msgPop {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .t-msg.user { flex-direction: row-reverse; }

    .t-msg-icon {
        width: 26px; height: 26px; border-radius: 8px;
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 13px;
    }
    .t-msg-icon.bot { background: linear-gradient(135deg,#22c55e,#16a34a); }
    .t-msg-icon.user { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); }

    .t-bubble {
        max-width: 80%;
        padding: 9px 13px;
        border-radius: 12px;
        font-size: 12.5px;
        line-height: 1.55;
        word-break: break-word;
    }

    .t-msg.bot .t-bubble {
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(34,197,94,0.2);
        color: #e2e8f0;
        border-bottom-left-radius: 3px;
    }
    .t-msg.user .t-bubble {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #022c14;
        font-weight: 600;
        border-bottom-right-radius: 3px;
    }

    /* Typing dots */
    .typing-dots {
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(34,197,94,0.2);
        border-radius: 12px;
        border-bottom-left-radius: 3px;
        padding: 10px 14px;
        display: flex; gap: 4px; align-items: center;
    }
    .typing-dots span {
        width: 5px; height: 5px;
        background: #22c55e; border-radius: 50%;
        animation: dotBounce 1.1s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dotBounce {
        0%,60%,100% { transform: translateY(0); opacity:0.4; }
        30% { transform: translateY(-5px); opacity:1; }
    }

    /* Input area */
    .tora-input-area {
        padding: 10px 12px 14px;
        border-top: 1px solid rgba(34,197,94,0.18);
        background: rgba(2,6,23,0.5);
        flex-shrink: 0;
    }

    .tora-input-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(34,197,94,0.3);
        border-radius: 12px;
        padding: 8px 10px 8px 14px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .tora-input-row:focus-within {
        border-color: #22c55e;
        box-shadow: 0 0 0 3px rgba(34,197,94,0.12);
    }

    #tora-input {
        flex: 1;
        background: transparent;
        border: none; outline: none;
        color: #e2e8f0;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 12.5px;
        resize: none;
        line-height: 1.5;
        max-height: 80px;
        overflow-y: auto;
    }
    #tora-input::placeholder { color: #475569; }

    .tora-send-btn {
        width: 32px; height: 32px;
        border-radius: 9px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
        box-shadow: 0 0 12px rgba(34,197,94,0.4);
    }
    .tora-send-btn:hover:not(:disabled) { transform: scale(1.08); }
    .tora-send-btn:active:not(:disabled) { transform: scale(0.95); }
    .tora-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tora-send-btn svg { width: 14px; height: 14px; fill: #022c14; }

    /* Suggestion chips */
    .tora-chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding: 0 12px 8px;
    }
    .t-chip {
        font-size: 11px;
        padding: 5px 10px;
        border-radius: 99px;
        background: rgba(34,197,94,0.08);
        border: 1px solid rgba(34,197,94,0.3);
        color: #86efac;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        font-family: 'Space Grotesk', sans-serif;
    }
    .t-chip:hover { background: rgba(34,197,94,0.2); color: #fff; border-color: #22c55e; }

    /* =========================================
       RESUME BUTTON
       ========================================= */
    .resume-btn {
        position: fixed; 
        top: 30px;
        right: 40px;
        z-index: 1000;
        padding: 12px 24px;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 255, 204, 0.5);
        border-radius: 10px;
        color: var(--text-main);
        font-family: 'Space Grotesk', sans-serif;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), 0 0 10px rgba(0, 255, 204, 0.2);
    }
    .resume-btn:hover {
        background: rgba(0, 255, 204, 0.15);
        border-color: var(--secondary);
        box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
        transform: translateY(-3px) scale(1.05);
        color: #fff;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }
    .resume-btn::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.4), transparent);
        transition: all 0.5s ease;
    }
    .resume-btn:hover::after { left: 150%; transition: all 0.7s ease; }
</style>
</head>

<div class="hero-section" id="aboutme">
    <canvas id="starsCanvas"></canvas>
</div>

<nav class="top-nav">
    <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="#aboutme">About</a></li>

<!-- ========== TORA ROBOT + CHAT PANEL ========== -->
<div id="chuti-bot">

    <!-- ── FULL AI CHAT PANEL ── -->
    <div class="tora-chat-panel" id="tora-chat-panel">

        <!-- Header -->
        <div class="tora-header">
            <div class="tora-avatar">🤖</div>
            <div class="tora-header-info">
                <div class="tora-header-name">TORA · AI Assistant</div>
                <div class="tora-header-status">● Online · Ask me about Malith!</div>
            </div>
            <button class="tora-close-btn" onclick="closeChat(event)" title="Close">✕</button>
        </div>

        <!-- Messages -->
        <div class="tora-messages" id="tora-messages"></div>

        <!-- Quick chips (hidden after first message) -->
        <div class="tora-chips" id="tora-chips">
            <span class="t-chip" onclick="sendChip(this)">Who is Malith?</span>
            <span class="t-chip" onclick="sendChip(this)">His degree?</span>
            <span class="t-chip" onclick="sendChip(this)">Web Dev skills?</span>
            <span class="t-chip" onclick="sendChip(this)">Top projects?</span>
            <span class="t-chip" onclick="sendChip(this)">Contact info?</span>
        </div>

        <!-- Input -->
        <div class="tora-input-area">
            <div class="tora-input-row">
                <textarea
                    id="tora-input"
                    rows="1"
                    placeholder="Ask TORA anything…"
                    onkeydown="handleToraKey(event)"
                    oninput="toraAutoResize(this)"
                ></textarea>
                <button class="tora-send-btn" id="tora-send-btn" onclick="toraSend()" title="Send">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- TORA Robot body -->
    <div class="chuti-name" id="tora-name"></div>
    <div class="chuti-shadow"></div>
    <div class="chuti-wrapper">
        <div class="chuti-arm left"></div>
        <div class="chuti-arm right"></div>
        <div class="chuti-leg left"></div>
        <div class="chuti-leg right"></div>
        <div class="chuti-body">
            <div class="chuti-core"></div>
        </div>
        <div class="chuti-head" id="chuti-head">
            <div class="chuti-ear left"></div>
            <div class="chuti-ear right"></div>
            <div class="chuti-visor">
                <div class="chuti-eyes-container" id="chuti-eyes">
                    <div class="chuti-eye"></div>
                    <div class="chuti-eye"></div>
                </div>
                <div class="chuti-cheek left"></div>
                <div class="chuti-cheek right"></div>
            </div>
        </div>
    </div>
</div>

<a href="MALITH ERANGA CV.pdf" target="_blank" class="resume-btn" id="resumeBtn">MY RESUME</a>

<iframe id="Projects" src="Projects.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="education" src="Education.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="more" src="Skills.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>
<iframe id="contact" src="Contact.html" class="Projects-iframe" scrolling="no" onload="resizeIframe(this)"></iframe>

<script>
    // =========================================
    // STARS
    // =========================================
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    const heroSection = document.querySelector('.hero-section');
    let stars = [];

    function resize() { canvas.width = heroSection.offsetWidth; canvas.height = heroSection.offsetHeight; }

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.2;
            this.baseAlpha = Math.random() * 0.5 + 0.1;
            this.pulseSpeed = Math.random() * 0.02 + 0.005;
            this.angle = Math.random() * Math.PI * 2;
        }
        update() {
            this.angle += this.pulseSpeed;
            this.alpha = this.baseAlpha + Math.sin(this.angle) * 0.5;
            if (this.alpha < 0) this.alpha = 0;
            if (this.alpha > 1) this.alpha = 1;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            if (this.alpha > 0.6) { ctx.shadowBlur = 6; ctx.shadowColor = "rgba(255,255,255,0.8)"; }
            else { ctx.shadowBlur = 0; }
            ctx.fill();
        }
    }

    function initStars() { stars = []; for (let i = 0; i < 200; i++) stars.push(new Star()); }
    function animateStars() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(animateStars); }
    window.addEventListener('resize', resize); resize(); initStars(); animateStars();

    // =========================================
    // NAV SCROLL
    // =========================================
    const navLinks = document.querySelectorAll('.top-nav ul li a');
    window.addEventListener('scroll', () => {
        let current = '';
        document.querySelectorAll('#aboutme, #Projects, #education, #more, #contact').forEach(sec => {
            if (pageYOffset >= sec.offsetTop - 250) current = sec.getAttribute('id');
        });
        navLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href').includes(current) && current) link.classList.add('active');
        });
    });

    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'resize') {
            document.querySelectorAll('.Projects-iframe').forEach(iframe => {
                if (event.data.url.includes(iframe.getAttribute('src')))
                    iframe.style.height = event.data.height + 'px';
            });
        }
    });

    function slowScrollTo(elementId, duration) {
        const target = document.getElementById(elementId);
        if (!target) return;
        document.documentElement.style.scrollBehavior = 'auto';
        const targetPosition = target.getBoundingClientRect().top + window.pageYOffset;
        const startPosition = window.pageYOffset;
        const distance = targetPosition - startPosition;
        let startTime = null;
        function animation(currentTime) {
            if (startTime === null) startTime = currentTime;
            const timeElapsed = currentTime - startTime;
            const run = easeInOutQuad(timeElapsed, startPosition, distance, duration);
            window.scrollTo(0, run);
            if (timeElapsed < duration) requestAnimationFrame(animation);
            else document.documentElement.style.scrollBehavior = 'smooth';
        }
        function easeInOutQuad(t, b, c, d) {
            t /= d / 2;
            if (t < 1) return c / 2 * t * t + b;
            t--;
            return -c / 2 * (t * (t - 2) - 1) + b;
        }
        requestAnimationFrame(animation);
    }

    // =========================================
    // TORA AI CHATBOT – Claude API
    // =========================================
    const TORA_SYSTEM = `You are TORA, a cute and friendly AI assistant robot embedded in Malith Eranga's personal portfolio website.
Your personality: Friendly, helpful, slightly playful, uses occasional emojis. Keep answers SHORT and punchy — 2 to 4 sentences max.
Only answer questions about Malith or his portfolio. Politely redirect anything unrelated.

MALITH ERANGA – PORTFOLIO INFO:
- Full Name: Malith Eranga
- Role: Undergraduate Student, Freelance Graphic Designer, Web Developer, Founder of "Modern Pixels"
- Degree: BSc (Hons) in Chemical Technology at Sabaragamuwa University of Sri Lanka (SUSL)
- Web Dev Skills: HTML, CSS, JavaScript, PHP, MySQL, C Programming
- Design Skills: Adobe Photoshop (5+ years), Adobe Illustrator — professional-level graphic design
- Notable Projects:
    • SafeHeaven – Pet Care platform
    • GreenChain – Carbon Footprint Tracker
- Laptop/Setup: ASUS TUF F15 with NVIDIA RTX 3050
- Business: Founder of "Modern Pixels" — a freelance design & web studio
- Location: Sri Lanka
- Contact: Available via the Contact section of this portfolio
- Interests: Tech, design, sustainability, clean UI/UX

If asked about contact, tell them to scroll to the Contact section of the portfolio.`;

    let toraHistory = [];
    let toraLoading = false;

    // Open chat on robot click
    const chutiBot = document.getElementById('chuti-bot');
    const chatPanel = document.getElementById('tora-chat-panel');

    chutiBot.addEventListener('click', (e) => {
        if (e.target.closest('.tora-chat-panel')) return;
        chatPanel.classList.add('show');
        if (toraHistory.length === 0) {
            addToraMsg('bot', "Hey! I'm TORA 🤖 Malith's AI assistant. Ask me anything about him!");
        }
    });

    function closeChat(e) {
        e.stopPropagation();
        chatPanel.classList.remove('show');
    }

    async function toraSend(text) {
        const input = document.getElementById('tora-input');
        const msg = (text || input.value).trim();
        if (!msg || toraLoading) return;

        document.getElementById('tora-chips').style.display = 'none';
        addToraMsg('user', msg);
        if (!text) { input.value = ''; toraAutoResize(input); }

        toraHistory.push({ role: 'user', content: msg });
        setToraLoading(true);

        try {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    system: TORA_SYSTEM,
                    messages: toraHistory
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            const reply = data.content?.find(b => b.type === 'text')?.text || "Hmm, I couldn't get a response. Try again! 🙏";
            toraHistory.push({ role: 'assistant', content: reply });
            removeToraTyping();
            addToraMsg('bot', reply);

        } catch (err) {
            removeToraTyping();
            addToraMsg('bot', `⚠️ Connection issue: ${err.message}`);
        } finally {
            setToraLoading(false);
        }
    }

    function sendChip(el) { toraSend(el.textContent); }

    function addToraMsg(role, text) {
        const container = document.getElementById('tora-messages');
        const row = document.createElement('div');
        row.className = `t-msg ${role}`;
        const icon = role === 'bot' ? '🤖' : '🧑';
        row.innerHTML = `
            <div class="t-msg-icon ${role}">${icon}</div>
            <div class="t-bubble">${formatTora(text)}</div>`;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function showToraTyping() {
        const container = document.getElementById('tora-messages');
        const row = document.createElement('div');
        row.className = 't-msg bot';
        row.id = 'tora-typing';
        row.innerHTML = `
            <div class="t-msg-icon bot">🤖</div>
            <div class="typing-dots"><span></span><span></span><span></span></div>`;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function removeToraTyping() { document.getElementById('tora-typing')?.remove(); }

    function setToraLoading(val) {
        toraLoading = val;
        document.getElementById('tora-send-btn').disabled = val;
        if (val) showToraTyping();
    }

    function handleToraKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); toraSend(); }
    }

    function toraAutoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 80) + 'px';
    }

    function formatTora(text) {
        return text
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.*?)\*/g,'<em>$1</em>')
            .replace(/\n/g,'<br>');
    }

    // =========================================
    // MOUSE TRACKING (head & eyes follow cursor)
    // =========================================
    const chutiHead = document.getElementById('chuti-head');
    const chutiEyes = document.getElementById('chuti-eyes');
    let currentX = 0, currentY = 0, targetX = 0, targetY = 0;
    let rawMouseX = window.innerWidth / 2, rawMouseY = window.innerHeight / 2;

    function updateTargetPosition(clientX, clientY) {
        rawMouseX = clientX; rawMouseY = clientY;
        targetX = ((clientX / window.innerWidth) - 0.5) * 2;
        targetY = ((clientY / window.innerHeight) - 0.5) * 2;
    }

    document.addEventListener('mousemove', e => updateTargetPosition(e.clientX, e.clientY));

    document.querySelectorAll('.Projects-iframe').forEach(iframe => {
        iframe.addEventListener('load', () => {
            try {
                iframe.contentWindow.document.addEventListener('mousemove', e => {
                    const rect = iframe.getBoundingClientRect();
                    updateTargetPosition(e.clientX + rect.left, e.clientY + rect.top);
                });
            } catch(err) {}
        });
    });

    function animateChuti() {
        if (chutiHead && chutiEyes && chutiBot) {
            const rect = chutiBot.getBoundingClientRect();
            const dist = Math.hypot(rawMouseX - (rect.left + rect.width/2), rawMouseY - (rect.top + rect.height/2));
            chutiBot.classList.toggle('tora-active', dist < 150);

            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;

            chutiHead.style.transform = `translate(${currentX*8}px, ${currentY*5}px) rotate(${currentX*15}deg)`;
            chutiEyes.style.transform = `translate(${currentX*10}px, ${currentY*4}px)`;
        }
        requestAnimationFrame(animateChuti);
    }
    animateChuti();
</script>
</body>
</html>
